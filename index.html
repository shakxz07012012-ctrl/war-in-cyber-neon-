<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>ibill vs mosnyer - Shuken ⚡</title>
  <style>
    * {
      margin: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    canvas {
      display: block;
      background: #2a1a3a;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a0a2a;
      color: #aa88ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      font-family: monospace;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="loading">
    ⚡ Loading Shuken... ⚡
  </div>
  <canvas id="canvas"></canvas>
  
  <script src="AdivaClient.js"></script>
  <script src="AdivaServer.js"></script>
  <script src="./data.js"></script>
  <script src="./item.js"></script>
  <script src="./semut.js"></script>
  <script src="./kura.js"></script>
  <script src="./laba.js"></script>
  <script src="./shuken.js"></script>
  
  <script>
    const canvas = document.getElementById("canvas")
    const game = new GameLoop(canvas)
    const gl = game.gl
    const renderer = new Renderer(gl, canvas)
    const utils = new Utils()
    
    const physics = new Collision(150)
    physics.gameState.add("1")
    physics.grid.buildStatic(tembok)
    
    // ==========================================
    // ASET GAMBAR (termasuk Shuken)
    // ==========================================
    const listImg = {
      // Miya assets
      idle: { path: "Diam1.png" },
      lari1: { path: "Lari1.png" },
      lari2: { path: "Lari2.png" },
      lari3: { path: "Lari3.png" },
      jump: { path: "Lompat1.png" },
      fall: { path: "Turun1.png" },
      panah: { path: "Pnh2.png" },
      panahMisil: { path: "Misil1.png" },
      
      // Wall & environment
      wall: { path: "Walll1.png" },
      gerbang: { path: "WallRentak1.png" },
      
      // Items & buffs
      buff: { path: "Semut2.png" },
      heal: { path: "Heal1.png" },
      energi: { path: "Energi1.png" },
      peluruGanda: { path: "PeluruGanda1.png" },
      
      // Kelomang (kura)
      kelomang: { path: "Kura3.png" },
      kelomangDiam: { path: "Kura1.png" },
      kelomangNembak: { path: "Kura2.png" },
      
      // Guinevere (laba)
      guinLari: { path: "LabaLari2.png" },
      guinDiam: { path: "LabaLari1.png" },
      guinLompat: { path: "LabaNembak1.png" },
      guinUlti: { path: "LabaMakan2.png" },
      guinShoot: { path: "LabaNembak2.png" },
      bolaGuin: { path: "BolaUlti2.png" },
      
      // ===== SHUKEN ASSETS =====
      shukenIdle: { path: "ShukenIdle1.png" },
      shukenRun1: { path: "ShukenRun1.png" },
      shukenRun2: { path: "ShukenRun2.png" },
      shukenRun3: { path: "ShukenRun3.png" },
      shukenJump: { path: "ShukenJump1.png" },
      shukenFall: { path: "ShukenFall1.png" },
      shukenAttack1: { path: "ShukenAttack1.png" },
      shukenAttack2: { path: "ShukenAttack2.png" },
      shukenSkill1: { path: "ShukenSkill1.png" },
      shukenSkill2: { path: "ShukenSkill2.png" },
      shukenUlti: { path: "ShukenUlti1.png" },
      bolaPetir: { path: "BolaPetir1.png" },
      petirArea: { path: "PetirArea1.png" },
      petirAtas: { path: "PetirAtas1.png" }
    }
    
    // ==========================================
    // DATA HERO (Miya + Shuken)
    // ==========================================
    const hero = {
      miya: {
        x: 0,
        y: -800,
        width: 100,
        height: 100,
        hp: 150,
        maxHp: 150,
        energi: 100,
        maxEnergi: 100,
        gravity: 2000,
        jumpPower: 700,
        useCollider: true,
        colliderBox: { width: 50, height: 100 },
        useHurtBox: true,
        hurtBox: { x: 0, y: 0, width: 50, height: 120 },
        vx: 0,
        vy: 0,
        scene: "1",
        isAttack: false,
        superState: false,
        superTimer: 0,
        state: "idle",
        img: "idle",
        animationDirection: "right",
        statusItem: "",
        durasiItem: 0,
        tintColor: "white",
        currentHero: "miya"
      },
      shuken: {
        x: 0,
        y: -800,
        width: 100,
        height: 110,
        hp: 120,
        maxHp: 120,
        energi: 100,
        maxEnergi: 100,
        gravity: 2000,
        jumpPower: 680,
        speed: 550,
        attackDamage: 35,
        useCollider: true,
        colliderBox: { width: 50, height: 100 },
        useHurtBox: true,
        hurtBox: { x: 0, y: 0, width: 50, height: 120 },
        vx: 0,
        vy: 0,
        scene: "1",
        isAttacking: false,
        isUsingSkill: false,
        skill1Cooldown: 0,
        skill2Cooldown: 0,
        ultiCooldown: 0,
        superState: false,
        superTimer: 0,
        state: "idle",
        img: "shukenIdle",
        animationDirection: "right",
        tintColor: "white",
        currentHero: "miya"
      }
    }
    
    // HP Bar & Mana Bar
    const hpBar = new VirtualBarDiv({
      value: hero.miya.hp,
      maxValue: hero.miya.maxHp,
      width: 150,
      height: 15,
      top: 38,
      left: 82,
      fillColor: "lime",
      visualColor: "maroon",
      background: "#222",
      border: "1px solid black",
      lerpSpeed: 5
    })
    
    const manaBar = new VirtualBarDiv({
      value: 100,
      maxValue: 100,
      width: 150,
      height: 10,
      top: 55,
      left: 82,
      fillColor: "yellow",
      visualColor: "aqua",
      background: "#222",
      border: "1px solid black",
      lerpSpeed: 5
    })
    
    hpBar.el.style.display = "none"
    manaBar.el.style.display = "none"
    
    // ==========================================
    // VIRTUAL BUTTONS (Miya + Shuken)
    // ==========================================
    
    // Movement buttons
    const tombolKiri = new VirtualButton({
      text: "←",
      bottom: 15,
      left: 30,
      onPress: () => tombolKiri.press = true,
      onRelease: () => tombolKiri.press = false
    })
    
    const tombolKanan = new VirtualButton({
      text: "→",
      bottom: 15,
      left: 120,
      onPress: () => tombolKanan.press = true,
      onRelease: () => tombolKanan.press = false
    })
    
    const tombolLompat = new VirtualButton({
      text: "↑",
      bottom: 100,
      right: 200,
      onPress: () => {
        const activeHero = hero.miya.currentHero === "miya" ? hero.miya : hero.shuken
        activeHero.jumpBufferTimer = activeHero.jumpBufferMax || 0.15
      }
    })
    
    // Miya's arrow
    const listPanahMiya = {}
    const tombolPanah = new VirtualButton({
      img: "Misil1.png",
      bottom: 100,
      right: 20,
      onPress: () => {
        if (hero.miya.currentHero !== "miya") return
        const miya = hero.miya
        if (miya.energi <= 0) return
        if (miya.isAttack) return
        miya.isAttack = true
        miya.energi -= 2
        manaBar.setValue(miya.energi)
        miya.superState = true
        miya.state = "panah"
        
        const id = crypto.randomUUID()
        listPanahMiya[id] = {
          id: id,
          x: miya.x + miya.width/2 - 15,
          y: miya.y + miya.height/3,
          width: miya.statusItem === "peluruGanda" ? 50 : 30,
          height: miya.statusItem === "peluruGanda" ? 50 : 30,
          scene: miya.scene,
          dir: miya.animationDirection === "right" ? 1 : -1,
          dirY: miya.statusItem === "peluruGanda" ? utils.rand(-0.5, 0.5) : 0,
          animationDirection: miya.animationDirection,
          speed: 500,
          lifeTime: 3,
          img: "panahMisil"
        }
        miya.superTimer = 0.1
      },
      onRelease: () => {
        if (hero.miya.currentHero !== "miya") return
        hero.miya.isAttack = false
      }
    })
    
    // ===== TOMBOL SWITCH KE SHUKEN =====
    const tombolSwitchKeShuken = new VirtualButton({
      text: "⚡",
      bottom: 15,
      right: 200,
      background: "rgba(128,0,255,0.8)",
      fontSize: 24,
      onPress: () => {
        const currentHero = hero.miya.currentHero || "miya"
        
        if (currentHero === "miya") {
          hero.shuken.x = hero.miya.x
          hero.shuken.y = hero.miya.y
          hero.shuken.hp = hero.miya.hp
          hero.shuken.energi = hero.miya.energi
          hero.shuken.currentHero = "shuken"
          hero.miya.currentHero = "shuken"
          
          hpBar.setMaxValue(hero.shuken.maxHp)
          hpBar.setValue(hero.shuken.hp)
          manaBar.setMaxValue(hero.shuken.maxEnergi)
          manaBar.setValue(hero.shuken.energi)
          
          hero.shuken.tintColor = "#aa44ff"
          setTimeout(() => {
            if (hero.shuken.tintColor === "#aa44ff") hero.shuken.tintColor = "white"
          }, 300)
        }
      }
    })
    
    // ===== TOMBOL SWITCH KE MIYA =====
    const tombolSwitchKeMiya = new VirtualButton({
      text: "🏹",
      bottom: 15,
      right: 290,
      background: "rgba(0,150,100,0.8)",
      fontSize: 24,
      onPress: () => {
        const currentHero = hero.miya.currentHero || "miya"
        
        if (currentHero === "shuken") {
          hero.miya.x = hero.shuken.x
          hero.miya.y = hero.shuken.y
          hero.miya.hp = hero.shuken.hp
          hero.miya.energi = hero.shuken.energi
          hero.miya.currentHero = "miya"
          hero.shuken.currentHero = "miya"
          
          hpBar.setMaxValue(hero.miya.maxHp)
          hpBar.setValue(hero.miya.hp)
          manaBar.setMaxValue(hero.miya.maxEnergi)
          manaBar.setValue(hero.miya.energi)
          
          hero.miya.tintColor = "#44ffaa"
          setTimeout(() => {
            if (hero.miya.tintColor === "#44ffaa") hero.miya.tintColor = "white"
          }, 300)
        }
      }
    })
    
    // ===== TOMBOL SKILL SHUKEN =====
    let dtGlobal = 0
    
    const tombolShukenAttack = new VirtualButton({
      text: "👊",
      bottom: 160,
      right: 20,
      background: "rgba(200,100,50,0.8)",
      onPress: () => {
        const player = hero.shuken
        if (player.currentHero !== "shuken") return
        if (player.isAttacking || player.isUsingSkill) return
        shukenBasicAttack(player, dtGlobal, utils, physics)
      }
    })
    
    const tombolShukenSkill1 = new VirtualButton({
      text: "⚡",
      bottom: 100,
      right: 20,
      background: "rgba(100,50,200,0.8)",
      fontSize: 28,
      onPress: () => {
        const player = hero.shuken
        if (player.currentHero !== "shuken") return
        if (player.skill1Cooldown > 0) return
        if (player.energi < 12) return
        if (player.isAttacking || player.isUsingSkill) return
        shukenSkill1BolaListrik(player, dtGlobal, utils)
      }
    })
    
    const tombolShukenSkill2 = new VirtualButton({
      text: "🌩️",
      bottom: 100,
      right: 110,
      background: "rgba(150,50,200,0.8)",
      fontSize: 24,
      onPress: () => {
        const player = hero.shuken
        if (player.currentHero !== "shuken") return
        if (player.skill2Cooldown > 0) return
        if (player.energi < 25) return
        if (player.isAttacking || player.isUsingSkill) return
        shukenSkill2PetirArea(player, dtGlobal, utils)
      }
    })
    
    const tombolShukenUlti = new VirtualButton({
      text: "💜⚡",
      bottom: 160,
      right: 110,
      background: "rgba(200,50,255,0.9)",
      fontSize: 20,
      onPress: () => {
        const player = hero.shuken
        if (player.currentHero !== "shuken") return
        if (player.ultiCooldown > 0) return
        if (player.energi < 50) return
        if (player.isAttacking || player.isUsingSkill) return
        shukenUltiPetirAtas(player, dtGlobal, utils)
      }
    })
    
    // Animasi variables
    let lariFrame = 1
    let lariTimer = 0
    let lariFrameShuken = 1
    let lariTimerShuken = 0
    const lariSpeed = 0.15
    
    const baseAnimasi = {
      idle: "idle",
      run: "run",
      jump: "jump",
      fall: "fall",
      panah: "panah"
    }
    
    // Asset & Draw
    const aset = new Aset(gl, listImg)
    const listDraw = [hero, tembok, listPanahMiya, buff, kelomang, bulletKelomang, guin, peluruGuin, drawItem, bolaPetir, petirArea, petirAtas]
    const listUpdateDraw = []
    
    async function init() {
      const loading = document.getElementById("loading")
      const texture = await aset.load()
      loading.style.display = "none"
      hpBar.el.style.display = "block"
      manaBar.el.style.display = "block"
      
      listDraw.forEach(entitas => {
        listUpdateDraw.push(new Draw(entitas, texture, renderer, physics.gameState))
      })
      
      // Dialog
      const dialog = new VirtualLyrics(canvas)
        .startX(10)
        .startY(100)
        .color("white")
        .fill("ibill .....")
        .fill("kesadaran yg engkau miliki")
        .fill("menjadikan dirimu sebagai puncak")
        .fill("rantai makanan")
        .fill("tetap tenang, dan terus maju")
      
      // UI Text
      const text = new VirtualText({
        text: "ibill",
        color: "white",
        fontSize: 25,
        padding: "2px 10px",
        textShadow: "2px 1px 1px red",
        top: 5,
        left: 70
      })
      
      const text2 = new VirtualText({
        text: "support development via DANA",
        color: "white",
        fontSize: 10,
        padding: "2px 10px",
        textShadow: "2px 1px 1px blue",
        top: 5,
        right: 5
      })
      
      const text3 = new VirtualText({
        text: "0821-1602-3162",
        color: "white",
        fontSize: 10,
        padding: "2px 10px",
        textShadow: "2px 1px 1px black",
        top: 20,
        right: 5
      })
      
      const avatar = new VirtualImg({
        src: "Avatar1.png",
        width: 70, height: 70,
        top: 5, left: 5,
        borderRadius: "50%",
        background: "#eee",
        border: "1px solid white"
      })
      
      game.render(dt => {
        dtGlobal = dt
        physics.grid.buildDynamic(buff, kelomang, bulletKelomang, guin, peluruGuin, drawItem, bolaPetir, petirArea, petirAtas)
        
        dialog.play(dt)
        
        // Camera follow active hero
        const activeHero = hero.miya.currentHero === "miya" ? hero.miya : hero.shuken
        game.cameraOn({ active: activeHero }, "active")
        
        for (let entitas of listUpdateDraw) {
          entitas.update(dt, game.camera)
        }
        
        // ===== MIYA LOGIC =====
        if (hero.miya.currentHero === "miya") {
          const miya = hero.miya
          
          // Animasi lari Miya
          if (miya.state === "run") {
            lariTimer += dt
            if (lariTimer >= lariSpeed) {
              lariTimer = 0
              lariFrame++
              if (lariFrame > 3) lariFrame = 1
            }
            miya.img = `lari${lariFrame}`
          } else {
            miya.img = baseAnimasi[miya.state] || "idle"
            lariTimer = 0
            lariFrame = 1
          }
          
          utils.timer(dt, "timeColorMiya", 0.5, () => {
            miya.tintColor = "white"
          })
          
          // Movement
          if (tombolKanan.press) {
            miya.vx = 400
          } else if (tombolKiri.press) {
            miya.vx = -400
          } else miya.vx = 0
          
          physics.applyPhysics(dt, miya)
          physics.platformerLogic(dt, miya)
          miya.vy += miya.gravity * dt
          utils.activeHurtBox(miya)
          
          if (miya.superTimer > 0) {
            miya.superTimer -= dt
            if (miya.superTimer <= 0) miya.superState = false
          }
          
          miya.energi = Math.min(miya.maxEnergi, miya.energi + 1 * dt)
          manaBar.setValue(miya.energi)
          
          // Arrow update
          for (let id in listPanahMiya) {
            let panah = listPanahMiya[id]
            panah.x += panah.dir * panah.speed * dt
            panah.y += panah.dirY * panah.speed * dt
            panah.lifeTime -= dt
            if (panah.lifeTime <= 0) delete listPanahMiya[panah.id]
          }
          
          // Collisions
          panahMiyaVsMonster(dt, listPanahMiya, physics)
          miyaVsMonster(dt, hero, hpBar, physics)
          panahMiyaVsKelomang(dt, listPanahMiya, physics)
          miyaVsKelomang(dt, hero, hpBar, physics)
          panahMiyaVsGuin(dt, listPanahMiya, physics)
          
          // Death/respawn
          if (miya.vy > 3000 || miya.hp <= 0) {
            Object.values(tembok).forEach(wl => {
              if (wl.img === "gerbang") wl.scene = "1"
            })
            Object.values({ ...kelomang, ...buff, ...guin }).forEach(el => {
              el.x = el.originalX
              el.y = el.originalY
              el.hp = el.originalHp
              el.scene = "1"
              el.isChase = false
              el.isDead = false
              el.vx = 0
            })
            miya.vy = 0
            miya.x = 0
            miya.y = 0
            miya.hp = miya.maxHp
            miya.energi = miya.maxEnergi
            hpBar.setValue(miya.hp)
            manaBar.setValue(miya.energi)
          }
        }
        
        // ===== SHUKEN LOGIC =====
        if (hero.shuken.currentHero === "shuken") {
          const shukenHero = hero.shuken
          
          // Movement
          if (tombolKanan.press) {
            shukenHero.vx = shukenHero.speed
          } else if (tombolKiri.press) {
            shukenHero.vx = -shukenHero.speed
          } else shukenHero.vx = 0
          
          physics.applyPhysics(dt, shukenHero)
          physics.platformerLogic(dt, shukenHero)
          shukenHero.vy += shukenHero.gravity * dt
          utils.activeHurtBox(shukenHero)
          
          // Update Shuken logic from shuken.js
          logikaShuken(dt, hero, hpBar, manaBar, physics, utils)
          
          // Animasi lari Shuken
          if (shukenHero.state === "run" && !shukenHero.superState) {
            lariTimerShuken += dt
            if (lariTimerShuken >= lariSpeed) {
              lariTimerShuken = 0
              lariFrameShuken++
              if (lariFrameShuken > 3) lariFrameShuken = 1
            }
            shukenHero.img = `shukenRun${lariFrameShuken}`
          } else if (!shukenHero.superState) {
            if (shukenHero.state === "jump") shukenHero.img = "shukenJump"
            else if (shukenHero.state === "fall") shukenHero.img = "shukenFall"
            else if (shukenHero.state === "idle") shukenHero.img = "shukenIdle"
          }
          
          // Update cooldowns
          if (shukenHero.skill1Cooldown > 0) shukenHero.skill1Cooldown -= dt
          if (shukenHero.skill2Cooldown > 0) shukenHero.skill2Cooldown -= dt
          if (shukenHero.ultiCooldown > 0) shukenHero.ultiCooldown -= dt
          
          // Update projectiles
          updateBolaPetir(dt, physics)
          updatePetirArea(dt, physics)
          updatePetirAtas(dt, physics)
          
          // Shuken damage to enemies
          shukenVsMusuh(dt, hero, hpBar, physics)
          
          // Death/respawn
          if (shukenHero.vy > 3000 || shukenHero.hp <= 0) {
            Object.values(tembok).forEach(wl => {
              if (wl.img === "gerbang") wl.scene = "1"
            })
            Object.values({ ...kelomang, ...buff, ...guin }).forEach(el => {
              el.x = el.originalX
              el.y = el.originalY
              el.hp = el.originalHp
              el.scene = "1"
              el.isChase = false
              el.isDead = false
              el.vx = 0
            })
            shukenHero.vy = 0
            shukenHero.x = 0
            shukenHero.y = 0
            shukenHero.hp = shukenHero.maxHp
            shukenHero.energi = shukenHero.maxEnergi
            hpBar.setValue(shukenHero.hp)
            manaBar.setValue(shukenHero.energi)
          }
        }
        
        // ===== COMMON MONSTER LOGIC =====
        for (let id in buff) {
          const monster = buff[id]
          logikaMonsterJungler(dt, hero.miya.currentHero === "miya" ? hero.miya : hero.shuken, monster, physics)
          hpMonster(dt, monster, game.camera, renderer)
        }
        
        logikaKelomang(dt, hero.miya.currentHero === "miya" ? hero.miya : hero.shuken, physics)
        updateBulletKelomang(dt, physics)
        Object.values(kelomang).forEach(el => hpKelomang(dt, el, game.camera, renderer))
        Object.values(guin).forEach(el => hpGuin(dt, el, game.camera, renderer))
        
        anakKelomangVsMiya(dt, hero, hpBar, physics)
        logikaGuinevere(dt, hero, hpBar, physics, utils)
        updatePeluruGuin(dt)
        peluruGuinVsMiya(dt, hero, hpBar, physics)
        
        miyaMengambilItem(hero, physics)
        miyaMenerimaEfekItem(hpBar, manaBar, hero, dt, utils)
      })
    }
    
    init()
  </script>
</body>
</html>
