<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>game battle | ibill</title>
  <style>
    * {
      margin: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    body {
      background: #0a0a2a;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      background: linear-gradient(180deg, #1a1a3a 0%, #2a1a3a 100%);
      width: 100%;
      height: 100%;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a0a2a;
      color: #aa88ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      font-family: monospace;
      z-index: 9999;
      flex-direction: column;
      gap: 20px;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #aa88ff;
      border-top-color: #ffcc00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #characterSelect {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a2a 0%, #1a0a3a 100%);
      z-index: 10000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }
    
    #characterSelect h1 {
      color: #ffcc00;
      font-size: 42px;
      text-shadow: 0 0 20px #ff6600;
      margin-bottom: 40px;
      letter-spacing: 5px;
      animation: glow 2s ease-in-out infinite;
    }
    
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 20px #ff6600; }
      50% { text-shadow: 0 0 40px #ffcc00; }
    }
    
    .char-container {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px;
    }
    
    .char-card {
      width: 240px;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid #666;
      backdrop-filter: blur(5px);
    }
    
    .char-card:hover {
      transform: scale(1.05);
      border-color: #ffcc00;
      box-shadow: 0 0 30px rgba(255,204,0,0.3);
    }
    
    .char-card.selected {
      border-color: #00ff00;
      box-shadow: 0 0 30px rgba(0,255,0,0.3);
      background: rgba(0,0,0,0.8);
    }
    
    .char-avatar {
      width: 130px;
      height: 130px;
      margin: 0 auto 15px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }
    
    .char-avatar.shuken { background-image: url('ShukenIdle1.png'); }
    .char-avatar.subaru { background-image: url('SubaruIdle1.png'); }
    
    .char-name {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    
    .char-name.shuken { color: #aa44ff; text-shadow: 0 0 10px #aa44ff; }
    .char-name.subaru { color: #aa66ff; text-shadow: 0 0 10px #aa66ff; }
    
    .char-stats {
      font-size: 11px;
      color: #ccc;
      text-align: left;
      margin-top: 10px;
      padding: 8px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
    }
    
    .char-stats span { color: #ffcc00; }
    
    .btn-start-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 35px;
    }
    
    .btn-start {
      padding: 12px 45px;
      font-size: 22px;
      font-weight: bold;
      background: linear-gradient(135deg, #ff6600, #ffcc00);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: monospace;
      color: #1a0a2a;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    
    .btn-start:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px #ffcc00;
    }
    
    .btn-start.disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
      box-shadow: none;
    }
    
    @media (max-width: 600px) {
      .char-container { gap: 20px; }
      .char-card { width: 200px; padding: 15px; }
      .char-avatar { width: 100px; height: 100px; }
      .char-name { font-size: 24px; }
      .char-stats { font-size: 10px; }
      #characterSelect h1 { font-size: 28px; margin-bottom: 25px; }
      .btn-start { padding: 10px 35px; font-size: 18px; }
    }
    
    @media (max-width: 450px) {
      .char-card { width: 170px; }
      .char-avatar { width: 85px; height: 85px; }
      .char-name { font-size: 20px; }
      .char-container { gap: 15px; }
    }
  </style>
</head>

      function selectCharacter(heroName) {
        cardShuken.classList.remove("selected")
        cardSubaru.classList.remove("selected")
        if (heroName === "shuken") cardShuken.classList.add("selected")
        else if (heroName === "subaru") cardSubaru.classList.add("selected")
        btnStart.classList.remove("disabled")
        selectedHero = heroName
      }
      
      cardShuken.onclick = () => selectCharacter("shuken")
      cardSubaru.onclick = () => selectCharacter("subaru")
      
      btnStart.onclick = () => {
        if (!selectedHero) return
        selectScreen.style.display = "none"
        
        hpBar.el.style.display = "block"
        manaBar.el.style.display = "block"
        
        const player = hero[selectedHero]
        hpBar.setMaxValue(player.maxHp)
        hpBar.setValue(player.hp)
        manaBar.setMaxValue(player.maxMp || player.maxEnergi)
        manaBar.setValue(player.mp || player.energi)
        
        nameText.update(selectedHero.toUpperCase())
        if (selectedHero === "shuken") { nameText.setColor("#aa44ff"); avatar.setSrc("ShukenIdle1.png") }
        else if (selectedHero === "subaru") { nameText.setColor("#aa88ff"); avatar.setSrc("SubaruIdle1.png") }
        
        startGameAfterLoad()
      }
      
      async function startGameAfterLoad() {
        const aset = new Aset(gl, listImg)
        loadedTexture = await aset.load()
        loadingDiv.style.display = "none"
        initGame()
      }
      
      function initGame() {
        if (gameController) gameController.destroy()
        
        gameController = new GameController(selectedHero, {
          onMove: (data) => {
            const player = hero[selectedHero]
            if (player.canMove && !player.superState && !player.isRespawning) {
              player.vx = data.dx * player.speed
              if (Math.abs(data.dx) > 0.1) {
                player.animationDirection = data.dx > 0 ? "right" : "left"
              }
            }
          },
          onMoveStop: () => {
            const player = hero[selectedHero]
            if (player.canMove && !player.superState && !player.isRespawning) {
              player.vx = 0
            }
          },
          onJump: () => {
            const player = hero[selectedHero]
            if (player.canMove && !player.superState && !player.isRespawning) {
              player.jumpBufferTimer = 0.15
            }
          },
          onAttack: () => {
            const player = hero[selectedHero]
            if (selectedHero === "shuken") {
              if (player.superState || player.isRespawning) return
              if (player.energi < 5) return
              player.isAttacking = true
              player.canMove = false
              player.energi -= 5
              manaBar.setValue(player.energi)
              player.superState = true
              player.state = "attack"
              player.img = "shukenAttack1"
              player.superTimer = 0.25
              const dmg = player.attackDamage
              const hitX = player.animationDirection === "right" ? player.x + player.width : player.x - 60
              const hitbox = { x: hitX, y: player.y + player.height/3, width: 60, height: 70, damage: dmg }
              physics.aabb({ temp: hitbox }, "buff", (h,m) => { m.hp -= dmg })
              physics.aabb({ temp: hitbox }, "kelomang", (h,m) => { m.hp -= dmg })
              physics.aabb({ temp: hitbox }, "guin", (h,m) => { if(m.aktif) m.hp -= dmg })
            } else if (selectedHero === "subaru") {
              if (player.isAttacking || !player.canAttack || player.isRespawning) return
              player.isAttacking = true
              player.canAttack = false
              player.state = "attack1"
              player.superTimer = 0.3
              const dmg = player.attackDamage + (player.damageBuff || 0)
              const hitX = player.animationDirection === "right" ? player.x + player.width - 40 : player.x - 60
              const hitbox = { x: hitX, y: player.y + player.height/2 - 40, width: 80, height: 80, damage: dmg }
              physics.aabb({ temp: hitbox }, "buff", (h,m) => { m.hp -= dmg; m.tintColor = "red" })
              physics.aabb({ temp: hitbox }, "kelomang", (h,m) => { m.hp -= dmg; m.tintColor = "red" })
              physics.aabb({ temp: hitbox }, "guin", (h,m) => { if(m.aktif) m.hp -= dmg; m.tintColor = "red" })
            }
          },
          onSkill1: () => {
            const player = hero[selectedHero]
            if (selectedHero === "shuken") {
              if (player.superState || player.isRespawning) return
              if (player.energi < 12) return
              player.isUsingSkill = true
              player.canMove = false
              player.energi -= 12
              manaBar.setValue(player.energi)
              player.superState = true
              player.state = "skill1"
              player.img = "shukenSkill1"
              player.superTimer = 0.35
              const id = crypto.randomUUID()
              player.bolaPetirList[id] = {
                id, x: player.x + player.width/2 - 20, y: player.y + player.height/3,
                width: 45, height: 45, scene: "1",
                dir: player.animationDirection === "right" ? 1 : -1,
                speed: 600, damage: 20, lifeTime: 2, img: "bolaPetir"
              }
            } else if (selectedHero === "subaru") {
              if (player.dashCd > 0 || player.mp < 15 || player.isRespawning) return

              manaBar.setValue(player.mp)
              player.dashCd = 2
              player.isDashing = true
              player.invincible = true
              player.invincibleTimer = 0.3
              player.state = "dash"
              const dashDist = 180
              player.x += player.animationDirection === "right" ? dashDist : -dashDist
              setTimeout(() => {
                player.isDashing = false
                if (player.state === "dash") player.state = "idle"
              }, 200)
            }

          onSkill2: () => {

              player.canAttack = false
              const id = crypto.randomUUID()

                id, x: player.x + (player.animationDirection === "right" ? player.width : -40),

            const player = hero[selectedHero]

              if (player.superState || player.isRespawning) return
              if (player.energi < 50) return
              player.isUsingSkill = true
              player.canMove = false
              player.energi -= 50
              manaBar.setValue(player.energi)
              player.superState = true
              player.state = "ulti"
              player.img = "shukenUlti"
              player.superTimer = 0.6
              const targetX = player.animationDirection === "right" ? player.x + player.width + 50 : player.x - 150
              const id = crypto.randomUUID()
              player.petirAtasList[id] = {
                id, x: targetX, y: -50, width: 120, height: 850,
                scene: "1", damage: 60, lifeTime: 0.5, img: "petirAtas", isFalling: true
              }
            } else if (selectedHero === "subaru") {
              if (player.thrustCd > 0 || player.mp < 20 || player.isRespawning) return
              player.mp -= 20
              manaBar.setValue(player.mp)
              player.thrustCd = 3
              player.invincible = true
              player.invincibleTimer = 0.3
              player.state = "attack3"
              player.superTimer = 0.4
              player.isAttacking = true
              player.canAttack = false
              const thrustDist = 120
              player.x += player.animationDirection === "right" ? thrustDist : -thrustDist
              const dmg = 35 + (player.damageBuff || 0)
              const hitX = player.animationDirection === "right" ? player.x : player.x - 60
              const hitbox = { x: hitX, y: player.y + player.height/2 - 40, width: 80, height: 80, damage: dmg }
              physics.aabb({ temp: hitbox }, "buff", (h,m) => { m.hp -= dmg })
              physics.aabb({ temp: hitbox }, "kelomang", (h,m) => { m.hp -= dmg })
              physics.aabb({ temp: hitbox }, "guin", (h,m) => { if(m.aktif) m.hp -= dmg })
            }
          },
          onUlti: () => {
            if (selectedHero === "shuken") {
              const player = hero.shuken
              if (player.superState || player.isRespawning) return
              if (player.energi < 50) return
              player.isUsingSkill = true
              player.canMove = false
              player.energi -= 50
              manaBar.setValue(player.energi)
              player.superState = true
              player.state = "ulti"
              player.img = "shukenUlti"
              player.superTimer = 0.6
              const targetX = player.animationDirection === "right" ? player.x + player.width + 50 : player.x - 150
              const id = crypto.randomUUID()
              player.petirAtasList[id] = {
                id, x: targetX, y: -50, width: 120, height: 850,
                scene: "1", damage: 60, lifeTime: 0.5, img: "petirAtas", isFalling: true
              }
            }
          }
        })
        
        startGameLoop()
      }
      
      let listDraw
      
      function startGameLoop() {
        const player = hero[selectedHero]
        
        listDraw = [player, tembok, buff, kelomang, guin, drawItem]
        if (selectedHero === "shuken") listDraw.push(player.bolaPetirList, player.petirAreaList, player.petirAtasList)
        if (selectedHero === "subaru") listDraw.push(player.magicProjectiles)
        
        let drawSystems = listDraw.map(obj => new Draw(obj, loadedTexture, renderer, physics.gameState))
        
        game.render(dt => {
          physics.grid.buildDynamic(buff, kelomang, guin, drawItem)
          
          const playerNow = hero[selectedHero]
          game.cameraOn({ p: playerNow }, "p", 4, 2.5)
          
          for (let ds of drawSystems) ds.update(dt, game.camera)
          
          // ==================== SHUKEN LOGIC ====================
          if (selectedHero === "shuken") {
            const shukenHero = hero.shuken
            const moveDir = gameController?.getMoveDirection().dx || 0
            
            shukenHero.skill1Cd = Math.max(0, shukenHero.skill1Cd - dt)
            shukenHero.skill2Cd = Math.max(0, shukenHero.skill2Cd - dt)
            shukenHero.ultiCd = Math.max(0, shukenHero.ultiCd - dt)
            
            if (shukenHero.superTimer > 0) {
              shukenHero.superTimer -= dt
              if (shukenHero.superTimer <= 0) { shukenHero.superState = false; shukenHero.isAttacking = false; shukenHero.isUsingSkill = false; shukenHero.canMove = true; shukenHero.state = "idle" }
            }
            
            if (shukenHero.canMove && !shukenHero.superState && !shukenHero.isRespawning) {
              shukenHero.vx = moveDir * shukenHero.speed
            } else if (!shukenHero.isRespawning) { shukenHero.vx = 0 }
            
            if (!shukenHero.superState && !shukenHero.isRespawning) {
              if (!shukenHero.onGround) shukenHero.state = shukenHero.vy < 0 ? "jump" : "fall"
              else if (Math.abs(shukenHero.vx) > 10) { shukenHero.state = "run"; lariTimerShuken += dt; if (lariTimerShuken >= lariSpeed) { lariTimerShuken = 0; lariFrameShuken = (lariFrameShuken % 3) + 1; shukenHero.img = `shukenRun${lariFrameShuken}` } }
              else { shukenHero.state = "idle"; shukenHero.img = "shukenIdle"; lariTimerShuken = 0; lariFrameShuken = 1 }
            }
            
            physics.applyPhysics(dt, shukenHero)
            physics.platformerLogic(dt, shukenHero)
            shukenHero.vy += shukenHero.gravity * dt
            utils.activeHurtBox(shukenHero)
            
            shukenHero.energi = Math.min(shukenHero.maxEnergi, shukenHero.energi + 2 * dt)
            manaBar.setValue(shukenHero.energi)
            hpBar.setValue(shukenHero.hp)
            
            for (let id in shukenHero.bolaPetirList) {
              let p = shukenHero.bolaPetirList[id]
              p.x += p.dir * p.speed * dt
              p.lifeTime -= dt
              if (p.lifeTime <= 0) delete shukenHero.bolaPetirList[id]
              else {
                physics.aabb({ temp: p }, "buff", (proj, m) => { m.hp -= p.damage; delete shukenHero.bolaPetirList[proj.id] })
                physics.aabb({ temp: p }, "kelomang", (proj, m) => { m.hp -= p.damage; delete shukenHero.bolaPetirList[proj.id] })
                physics.aabb({ temp: p }, "guin", (proj, m) => { if(m.aktif) m.hp -= p.damage; delete shukenHero.bolaPetirList[proj.id] })
              }
            }
            
            for (let id in shukenHero.petirAreaList) {
              let p = shukenHero.petirAreaList[id]
              p.lifeTime -= dt
              if (p.lifeTime <= 0) delete shukenHero.petirAreaList[id]
              else {
                physics.aabb({ temp: p }, "buff", (proj, m) => { m.hp -= p.damage })
                physics.aabb({ temp: p }, "kelomang", (proj, m) => { m.hp -= p.damage })
                physics.aabb({ temp: p }, "guin", (proj, m) => { if(m.aktif) m.hp -= p.damage })
              }
            }
            
            for (let id in shukenHero.petirAtasList) {
              let p = shukenHero.petirAtasList[id]
              p.lifeTime -= dt
              if (p.lifeTime <= 0) delete shukenHero.petirAtasList[id]
              else {
                physics.aabb({ temp: p }, "buff", (proj, m) => { m.hp -= p.damage })
                physics.aabb({ temp: p }, "kelomang", (proj, m) => { m.hp -= p.damage })
                physics.aabb({ temp: p }, "guin", (proj, m) => { if(m.aktif) m.hp -= p.damage })
              }
            }
            
            if (!shukenHero.invincible && !shukenHero.isRespawning) {
              physics.aabb({ shukenHero }, "buff", (p, m) => { p.hp -= 0.8; p.tintColor = "red" })
              physics.aabb({ shukenHero }, "kelomang", (p, m) => { p.hp -= 1; p.tintColor = "red" })
              physics.aabb({ shukenHero }, "guin", (p, m) => { if(m.aktif) p.hp -= 1.5; p.tintColor = "red" })
            }
            
            if (shukenHero.vy > 3000 || shukenHero.hp <= 0) resetGame(shukenHero)
          }
          
          // ==================== SUBARU LOGIC ====================
          if (selectedHero === "subaru") {
            const subaruHero = hero.subaru
            const moveDir = gameController?.getMoveDirection().dx || 0
            
            subaruHero.dashCd = Math.max(0, subaruHero.dashCd - dt)
            subaruHero.thrustCd = Math.max(0, subaruHero.thrustCd - dt)
            subaruHero.invincibleTimer = Math.max(0, subaruHero.invincibleTimer - dt)
            if (subaruHero.invincibleTimer <= 0) subaruHero.invincible = false
            
            if (subaruHero.superTimer > 0) {
              subaruHero.superTimer -= dt
              if (subaruHero.superTimer <= 0) {
                subaruHero.isAttacking = false
                subaruHero.canAttack = true
                if (subaruHero.state !== "dead") subaruHero.state = "idle"
              }
            }
            
            if (subaruHero.canMove && !subaruHero.superState && !subaruHero.isRespawning && !subaruHero.isDashing) {
              subaruHero.vx = moveDir * subaruHero.speed
            } else if (!subaruHero.isRespawning) { subaruHero.vx = 0 }
            
            // Return by Death
            if (!subaruHero.isRespawning && subaruHero.hp <= subaruHero.maxHp * 0.25 && subaruHero.scene === "1") {
              subaruHero.isRespawning = true
              subaruHero.respawnTimer = 0.8
              subaruHero.state = "dead"
              subaruHero.canMove = false
              subaruHero.canAttack = false
              subaruHero.deathCheckpoint = { x: Math.max(0, subaruHero.x - 100), y: subaruHero.y, hp: subaruHero.maxHp, mp: subaruHero.maxMp }
              subaruHero.deathCount++
              renderer.fillRect(0, 0, canvas.width, canvas.height, "red", 0.7)
            }
            
            if (subaruHero.isRespawning) {
              subaruHero.respawnTimer -= dt
              if (subaruHero.respawnTimer <= 0) {
                subaruHero.x = subaruHero.deathCheckpoint.x
                subaruHero.y = subaruHero.deathCheckpoint.y
                subaruHero.hp = subaruHero.deathCheckpoint.hp
                subaruHero.mp = subaruHero.deathCheckpoint.mp
                subaruHero.isRespawning = false
                subaruHero.state = "idle"
                subaruHero.canMove = true
                subaruHero.canAttack = true
                subaruHero.vx = 0
                subaruHero.vy = 0
                hpBar.setValue(subaruHero.hp)
              }
            }
            
            // Animasi state
            if (!subaruHero.isRespawning && !subaruHero.isDashing && subaruHero.superTimer <= 0) {
              if (!subaruHero.onGround) {
                subaruHero.state = subaruHero.vy < 0 ? "jump" : "fall"
              } else if (Math.abs(subaruHero.vx) > 10) {
                subaruHero.state = "run"
                const frame = Math.floor(Date.now() / 100) % 8 + 1
                subaruHero.img = `subaruRun${frame}`
              } else if (subaruHero.state !== "attack1" && subaruHero.state !== "attack2" && subaruHero.state !== "attack3" && subaruHero.state !== "dash") {
                subaruHero.state = "idle"
                const frame = Math.floor(Date.now() / 150) % 6 + 1
                subaruHero.img = `subaruIdle${frame}`
              }
            }
            
            physics.applyPhysics(dt, subaruHero)
            physics.platformerLogic(dt, subaruHero)
            subaruHero.vy += subaruHero.gravity * dt
            utils.activeHurtBox(subaruHero)
            
            subaruHero.mp = Math.min(subaruHero.maxMp, subaruHero.mp + 8 * dt)
            manaBar.setValue(subaruHero.mp)
            hpBar.setValue(subaruHero.hp)
            
            // Update projectiles
            for (let id in subaruHero.magicProjectiles) {
              let p = subaruHero.magicProjectiles[id]
              p.x += p.dir * p.speed * dt
              p.lifeTime -= dt
              if (p.lifeTime <= 0) delete subaruHero.magicProjectiles[id]
              else {
                physics.aabb({ temp: p }, "buff", (proj, m) => { m.hp -= p.damage; delete subaruHero.magicProjectiles[proj.id] })
                physics.aabb({ temp: p }, "kelomang", (proj, m) => { m.hp -= p.damage; delete subaruHero.magicProjectiles[proj.id] })
                physics.aabb({ temp: p }, "guin", (proj, m) => { if(m.aktif) m.hp -= p.damage; delete subaruHero.magicProjectiles[proj.id] })
              }
            }
            
            if (!subaruHero.invincible && !subaruHero.isRespawning) {
              physics.aabb({ subaruHero }, "buff", (p, m) => { p.hp -= 0.8; p.tintColor = "red" })
              physics.aabb({ subaruHero }, "kelomang", (p, m) => { p.hp -= 1; p.tintColor = "red" })
              physics.aabb({ subaruHero }, "guin", (p, m) => { if(m.aktif) p.hp -= 1.5; p.tintColor = "red" })
            }
            
            if (subaruHero.tintColor === "red") setTimeout(() => { if(subaruHero.tintColor === "red") subaruHero.tintColor = "white" }, 100)
            
            if (subaruHero.vy > 3000 || subaruHero.hp <= 0) resetGame(subaruHero)
          }
          
          // ==================== MONSTER LOGIC ====================
          for (let id in buff) {
            const m = buff[id]
            if (m.hp <= 0) { delete buff[id]; spawnItem(m.x, m.y); continue }
            if (!m.maxHp) m.maxHp = 50
            m.hpVisual = m.hpVisual || m.hp
            m.hpVisual += (m.hp - m.hpVisual) * 0.2 * dt * 10
            const dx = hero[selectedHero].x - m.x
            if (Math.abs(dx) < 300) {
              if (dx > 5) m.vx = 100
              else if (dx < -5) m.vx = -100
              else m.vx = 0
            } else m.vx = 0
            renderer.fillRect(m.x - game.camera.x, m.y - game.camera.y - 12, (m.hpVisual / m.maxHp) * 80, 6, "maroon")
            renderer.fillRect(m.x - game.camera.x, m.y - game.camera.y - 12, (m.hp / m.maxHp) * 80, 6, "red")
          }
          
          for (let id in kelomang) {
            const m = kelomang[id]
            if (m.hp <= 0) { delete kelomang[id]; spawnItem(m.x, m.y); continue }
            if (!m.maxHp) m.maxHp = 80
            m.hpVisual = m.hpVisual || m.hp
            m.hpVisual += (m.hp - m.hpVisual) * 0.2 * dt * 10
            const dx = hero[selectedHero].x - m.x
            if (Math.abs(dx) < 400) {
              if (dx > 5) m.vx = 80
              else if (dx < -5) m.vx = -80
              else m.vx = 0
            } else m.vx = 0
            renderer.fillRect(m.x - game.camera.x, m.y - game.camera.y - 12, (m.hpVisual / m.maxHp) * 80, 6, "maroon")
            renderer.fillRect(m.x - game.camera.x, m.y - game.camera.y - 12, (m.hp / m.maxHp) * 80, 6, "red")
          }
          
          for (let id in guin) {
            const m = guin[id]
            if (m.hp <= 0) { m.scene = "inactive"; spawnItem(m.x, m.y); continue }
            if (!m.maxHp) m.maxHp = 200
            m.hpVisual = m.hpVisual || m.hp
            m.hpVisual += (m.hp - m.hpVisual) * 0.2 * dt * 10
            const dx = hero[selectedHero].x - m.x
            if (Math.abs(dx) < 500) m.aktif = true
            if (m.aktif) {
              if (dx > 10) m.vx = 120
              else if (dx < -10) m.vx = -120
              else m.vx = 0
            }
            renderer.fillRect(m.x - game.camera.x, m.y - game.camera.y - 15, (m.hpVisual / m.maxHp) * 100, 8, "maroon")
            renderer.fillRect(m.x - game.camera.x, m.y - game.camera.y - 15, (m.hp / m.maxHp) * 100, 8, "red")
          }
          
          // Item drop & collection
          for (let id in drawItem) {
            const it = drawItem[id]
            it.lifeTime = (it.lifeTime || 8) - dt
            if (it.lifeTime <= 0) { delete drawItem[id]; continue }
            const playerNow = hero[selectedHero]
            if (Math.abs(playerNow.x - it.x) < 50 && Math.abs(playerNow.y - it.y) < 50) {
              if (it.itemType === "heal") playerNow.hp = Math.min(playerNow.maxHp, playerNow.hp + 30)
              if (it.itemType === "energi") {
                if (playerNow.mp !== undefined) playerNow.mp = Math.min(playerNow.maxMp, playerNow.mp + 30)
                else playerNow.energi = Math.min(playerNow.maxEnergi, playerNow.energi + 30)
              }
              if (it.itemType === "peluruGanda") playerNow.damageBuff = 5
              hpBar.setValue(playerNow.hp)
              if (manaBar) manaBar.setValue(playerNow.mp || playerNow.energi)
              delete drawItem[id]
            }
          }
          
          if (hero[selectedHero].damageBuff > 0) {
            hero[selectedHero].damageBuff -= dt
            if (hero[selectedHero].damageBuff <= 0) hero[selectedHero].damageBuff = 0
          }
          
          if (hero[selectedHero].tintColor === "red") {
            setTimeout(() => { if(hero[selectedHero].tintColor === "red") hero[selectedHero].tintColor = "white" }, 100)
          }
        })
      }
      
      function resetGame(playerObj) {
        Object.values(tembok).forEach(wl => { if (wl.img === "gerbang") wl.scene = "1" })
        Object.values({...kelomang, ...buff, ...guin}).forEach(el => {
          if (el.originalX !== undefined) { el.x = el.originalX; el.y = el.originalY; el.hp = el.originalHp; el.scene = "1" }
          el.isChase = false; el.isDead = false; el.vx = 0
        })
        playerObj.vy = 0; playerObj.x = 0; playerObj.y = -800
        playerObj.hp = playerObj.maxHp
        if (playerObj.mp !== undefined) playerObj.mp = playerObj.maxMp
        if (playerObj.energi !== undefined) playerObj.energi = playerObj.maxEnergi
        playerObj.superState = false; playerObj.superTimer = 0
        playerObj.canMove = true; playerObj.state = "idle"
        playerObj.isRespawning = false
        hpBar.setValue(playerObj.hp)
        manaBar.setValue(playerObj.mp || playerObj.energi)
      }
      
      function spawnItem(x, y) {
        const rand = Math.random()
        let type = "heal"
        if (rand < 0.33) type = "heal"
        else if (rand < 0.66) type = "energi"
        else type = "peluruGanda"
        const id = crypto.randomUUID()
        drawItem[id] = {
          id, x, y, width: 40, height: 40, type: "item",
          itemType: type, scene: "1", lifeTime: 8,
          img: type === "heal" ? "heal" : (type === "energi" ? "energi" : "peluruGanda")
        }
      }
      
      (async () => {
        const aset = new Aset(gl, listImg)
        loadedTexture = await aset.load()
        loadingDiv.style.display = "none"
        selectScreen.style.display = "flex"
      })()
    })()
  </script>
</body>
