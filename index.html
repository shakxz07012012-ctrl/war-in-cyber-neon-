<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>⚡ ibill vs mosnyer - Battle Arena ⚔️</title>
  <style>
    * {
      margin: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    body {
      background: #0a0a2a;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      background: linear-gradient(180deg, #1a1a3a 0%, #2a1a3a 100%);
      width: 100%;
      height: 100%;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a0a2a;
      color: #aa88ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      font-family: monospace;
      z-index: 9999;
      flex-direction: column;
      gap: 20px;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #aa88ff;
      border-top-color: #ffcc00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #characterSelect {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a2a 0%, #1a0a3a 100%);
      z-index: 10000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }
    
    #characterSelect h1 {
      color: #ffcc00;
      font-size: 42px;
      text-shadow: 0 0 20px #ff6600;
      margin-bottom: 40px;
      letter-spacing: 5px;
      animation: glow 2s ease-in-out infinite;
    }
    
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 20px #ff6600; }
      50% { text-shadow: 0 0 40px #ffcc00; }
    }
    
    .char-container {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px;
    }
    
    .char-card {
      width: 220px;
      padding: 15px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid #666;
      backdrop-filter: blur(5px);
    }
    
    .char-card:hover {
      transform: scale(1.05);
      border-color: #ffcc00;
      box-shadow: 0 0 30px rgba(255,204,0,0.3);
    }
    
    .char-card.selected {
      border-color: #00ff00;
      box-shadow: 0 0 30px rgba(0,255,0,0.3);
      background: rgba(0,0,0,0.8);
    }
    
    .char-avatar {
      width: 130px;
      height: 130px;
      margin: 0 auto 15px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }
    
    .char-avatar.miya { background-image: url('Avatar1.png'); }
    .char-avatar.shuken { background-image: url('ShukenIdle1.png'); }
    
    .char-name {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    
    .char-name.miya { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
    .char-name.shuken { color: #aa44ff; text-shadow: 0 0 10px #aa44ff; }
    
    .char-stats {
      font-size: 11px;
      color: #ccc;
      text-align: left;
      margin-top: 10px;
      padding: 8px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
    }
    
    .char-stats span { color: #ffcc00; }
    
    .btn-start-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 35px;
    }
    
    .btn-start {
      padding: 12px 45px;
      font-size: 22px;
      font-weight: bold;
      background: linear-gradient(135deg, #ff6600, #ffcc00);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: monospace;
      color: #1a0a2a;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    
    .btn-start:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px #ffcc00;
    }
    
    .btn-start.disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
      box-shadow: none;
    }
    
    @media (max-width: 600px) {
      .char-container { gap: 20px; }
      .char-card { width: 170px; padding: 10px; }
      .char-avatar { width: 100px; height: 100px; }
      .char-name { font-size: 22px; }
      .char-stats { font-size: 9px; padding: 6px; }
      #characterSelect h1 { font-size: 28px; margin-bottom: 25px; }
      .btn-start { padding: 10px 35px; font-size: 18px; }
      .btn-start-wrapper { margin-top: 25px; }
    }
    
    @media (max-width: 450px) {
      .char-card { width: 145px; }
      .char-avatar { width: 80px; height: 80px; }
      .char-name { font-size: 18px; }
      .char-stats { font-size: 8px; }
      .char-container { gap: 15px; }
    }
  </style>
</head>
