<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>ibill vs mosnyer</title>
  <style>
    *{
      margin :0;
    }
    canvas{
      display: block;
      background: #555;
    }

  #loading{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    z-index:9999;
  }
  </style>
</head>
<body>
  <div id="loading">
    Loading...
  </div>
  <canvas id = "canvas"></canvas>
  <script src="AdivaClient.js"></script>
  <script src="AdivaServer.js"></script>
  <script src="./data.js"></script>
  <script src="./item.js"></script>
  <script src="./semut.js"></script>
  <script src="./kura.js"></script>
  <script src="./laba.js"></script>
  <script>
    const canvas = document.getElementById("canvas")
    const game = new GameLoop(canvas)
    const gl = game.gl
    const renderer = new Renderer(gl, canvas)
    const utils = new Utils()
    
    const physics = new Collision(150)
    physics.gameState.add("1")
    physics.grid.buildStatic(tembok)
    
    const listImg = {
      idle : {path : "Diam1.png"},
      lari1 : {path : "Lari1.png"},
      lari2 : {path : "Lari2.png"},
      lari3 : {path : "Lari3.png"},
      jump : {path : "Lompat1.png"},
      fall : {path : "Turun1.png"},
      wall : {path : "Walll1.png"},
      gerbang : {path : "WallRentak1.png"},
      panah : {path : "Pnh2.png"},
      panahMisil : {path : "Misil1.png"},
      buff : {path : "Semut2.png"},
      kelomang : {path : "Kura3.png"},
      kelomangDiam : {path : "Kura1.png"},
      kelomangNembak : {path : "Kura2.png"},
      guinLari : {path : "LabaLari2.png"},
      guinDiam : {path : "LabaLari1.png"},
      guinLompat : {path : "LabaNembak1.png"},
      guinUlti : {path : "LabaMakan2.png"},
      guinShoot : {path : "LabaNembak2.png"},
      bolaGuin : {path : "BolaUlti2.png"},
      heal : {path : "Heal1.png"},
      energi : {path : "Energi1.png"},
      peluruGanda : {path : "PeluruGanda1.png"},
    }
    
    const hero = {
      miya : {
        x:0,
        y:-800,
        width : 100,
        height : 100,
        hp : 150,
        energi : 100,
        gravity : 2000,
        jumpPower :700,
        useCollider : true,
        colliderBox : {width :50, height:100},
        useHurtBox : true,
        hurtBox : {x:0,y:0,width :50, height:120},
        vx : 0,
        vy : 0,
        scene :"1"
      }
    }
    
    const hpBar = new VirtualBarDiv({
        value: hero.miya.hp,
        maxValue: hero.miya.hp,
        width: hero.miya.hp,
        height: 15,
        top: 38,
        left: 82,
        fillColor: "lime",
        visualColor: "maroon",
        background: "#222",
        border:"1px solid black",
        lerpSpeed: 5,
    });
        
    const manaBar = new VirtualBarDiv({
        value: 100,
        maxValue: 100,
        width: 100,
        height: 10,
        top: 55,
        left: 82,
        fillColor: "yellow",
        visualColor: "aqua",
        background: "#222",
        border:"1px solid black",
        lerpSpeed: 5,
    });
    hpBar.el.style.display = "none"
    manaBar.el.style.display = "none"
    
    const tombolKiri = new VirtualButton({
      text :"<=",
      bottom : 15,
      left :30,
      onPress :()=> tombolKiri.press = true,
      onRelease :()=> tombolKiri.press = false,
    })
    
    const tombolKanan = new VirtualButton({
      text :"=>",
      bottom : 15,
      left :120,
      onPress :()=> tombolKanan.press = true,
      onRelease :()=> tombolKanan.press = false,
    })
    
    const tombolLompat = new VirtualButton({
      text :"(^)",
      bottom : 100,
      right :100,
      onPress :()=> {
        const miya = hero.miya;
        miya.jumpBufferTimer = miya.jumpBufferMax
      }
    })
    
    const listPanahMiya = {}
    const tombolPanah = new VirtualButton({
      img :"Misil1.png",
      bottom : 100,
      right :20,
      onPress :()=> {
        const miya = hero.miya;
        if(miya.energi<=0)return
        if(miya.isAttack)return
        miya.isAttack = true
        miya.energi -=2
        manaBar.setValue(miya.energi);
        miya.superState = true
        miya.state = "panah"
        
        const id = crypto.randomUUID()
        listPanahMiya[id] = {
          id : id,
          x : miya.x + miya.width/2 - 15,
          y : miya.y + miya.height/3,
          width : miya.statusItem === "peluruGanda" ? 50 : 30,
          height : miya.statusItem === "peluruGanda" ? 50 : 30,
          scene : miya.scene,
          dir : miya.animationDirection === "right" ? 1 : -1,
          dirY : miya.statusItem === "peluruGanda" ? utils.rand(-0.5,0.5) : 0,
          animationDirection : miya.animationDirection,
          speed : 500,
          lifeTime : 3,
          img : "panahMisil"
        }
        miya.superTimer = 0.1
      },
      onRelease :()=> {
        const miya = hero.miya;
        miya.isAttack = false
      }
    })

    let lariFrame = 1;
    let lariTimer = 0;
    const lariSpeed = 0.15;

    const baseAnimasi = {
      idle : "idle",
      run : "run",
      jump : "jump",
      fall : "fall",
      panah : "panah",
    }
    
    const aset = new Aset(gl, listImg)
    const listDraw = [hero, tembok, listPanahMiya, buff, kelomang, bulletKelomang, guin, peluruGuin, drawItem]
    const listUpdateDraw = []
    
    async function init(){
      const loading = document.getElementById("loading")
      const texture = await aset.load()
      loading.style.display = "none"
      hpBar.el.style.display = "block"
      manaBar.el.style.display = "block"
      
      listDraw.forEach(entitas => {
        listUpdateDraw.push(new Draw(entitas, texture, renderer, physics.gameState))
      })
      
      const dialog = new VirtualLyrics(canvas)
      .startX(10)
      .startY(100)
      .color("white")
      .fill("ibill .....")
      .fill("kesadaran yg engkau miliki")
      .fill("menjadikan dirimu sebagai puncak")
      .fill("rantai makanan")
      .fill("tetap tenang, dan terus maju")
      
      const text = new VirtualText({
        text:"ibill",
        color :"white",
        fontSize :25,
        padding:"2px 10px",
        textShadow :"2px 1px 1px red",
        top : 5,
        left :70
      })
      const text2 = new VirtualText({
        text:"support development via DANA",
        color :"white",
        fontSize :10,
        padding:"2px 10px",
        textShadow :"2px 1px 1px blue",
        top : 5,
        right :5
      })
      const text3 = new VirtualText({
        text:"0821-1602-3162",
        color :"white",
        fontSize :10,
        padding:"2px 10px",
        textShadow :"2px 1px 1px black",
        top : 20,
        right :5
      })
      
      const avatar = new VirtualImg({
        src: "Avatar1.png",
        width: 70, height: 70,
        top: 5, left: 5,
        borderRadius: "50%",
        background:"#eee",
        border: "1px solid white"
      });
      
      game.render(dt =>{
        physics.grid.buildDynamic(buff, kelomang, bulletKelomang, guin, peluruGuin, drawItem)
        
        dialog.play(dt)
        game.cameraOn(hero, "miya")
        
        for(let entitas of listUpdateDraw){
          entitas.update(dt, game.camera)
        }
        
        // Animasi lari 3 frame
        if(hero.miya.state === "run") {
          lariTimer += dt;
          if(lariTimer >= lariSpeed) {
            lariTimer = 0;
            lariFrame++;
            if(lariFrame > 3) lariFrame = 1;
          }
          hero.miya.img = `lari${lariFrame}`;
        } else {
          hero.miya.img = baseAnimasi[hero.miya.state];
          lariTimer = 0;
          lariFrame = 1;
        }
        
        utils.timer(dt,"timeColorMiya", 0.5,()=>{
          hero.miya.tintColor = "white"
        })
        
        if(tombolKanan.press){
          hero.miya.vx = 400
        }else if(tombolKiri.press){
          hero.miya.vx = -400
        }else hero.miya.vx = 0
        
        physics.applyPhysics(dt, hero.miya)
        physics.platformerLogic(dt, hero.miya)
        
        hero.miya.vy += hero.miya.gravity * dt
        utils.activeHurtBox(hero.miya)
        const miya = hero.miya
        if(miya.superTimer > 0){
          miya.superTimer -= dt
          if(miya.superTimer <= 0){
            miya.superState = false
          }
        }
        miya.energi = Math.min(100, miya.energi + 1 * dt)
        manaBar.setValue(miya.energi)
        
        if(miya.vy > 3000 || miya.hp <= 0){
          Object.values(tembok).forEach(wl=>{
            if(wl.img === "gerbang") wl.scene = "1"
          })
          Object.values({...kelomang, ...buff, ...guin}).forEach(el=>{
            el.x = el.originalX
            el.y = el.originalY
            el.hp = el.originalHp
            el.scene = "1"
            el.isChase = false
            el.isDead = false
            el.vx = 0
          })
          miya.vy = 0
          miya.x = 0
          miya.y = 0
          miya.hp = 150
          miya.energi = 100
          hpBar.setValue(miya.hp)
          manaBar.setValue(miya.energi)
        }
        
        for(let id in listPanahMiya){
          let panah = listPanahMiya[id]
          panah.x += panah.dir * panah.speed * dt
          panah.y += panah.dirY * panah.speed * dt
          panah.lifeTime -= dt
          if(panah.lifeTime <= 0) delete listPanahMiya[panah.id]
        }
        
        for(let id in buff){
          const monster = buff[id]
          logikaMonsterJungler(dt, hero.miya, monster, physics)
          hpMonster(dt, monster, game.camera, renderer)
        }
        
        panahMiyaVsMonster(dt, listPanahMiya, physics)
        miyaVsMonster(dt, hero, hpBar, physics)
        logikaKelomang(dt, hero.miya, physics)
        updateBulletKelomang(dt, physics)
        Object.values(kelomang).forEach(el => hpKelomang(dt, el, game.camera, renderer))
        Object.values(guin).forEach(el => hpGuin(dt, el, game.camera, renderer))
        panahMiyaVsKelomang(dt, listPanahMiya, physics)
        panahMiyaVsGuin(dt, listPanahMiya, physics)
        miyaVsKelomang(dt, hero, hpBar, physics)
        anakKelomangVsMiya(dt, hero, hpBar, physics)
        logikaGuinevere(dt, hero, hpBar, physics, utils)
        updatePeluruGuin(dt)
        peluruGuinVsMiya(dt, hero, hpBar, physics)
        miyaMengambilItem(hero, physics)
        miyaMenerimaEfekItem(hpBar, manaBar, hero, dt, utils)
      })
    }
    init()
  </script>
</body>
</html>
