<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>ibill vs mosnyer - Pilih Karakter</title>
  <style>
    * {
      margin: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    canvas {
      display: block;
      background: #2a1a3a;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a0a2a;
      color: #aa88ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      font-family: monospace;
      z-index: 9999;
      flex-direction: column;
      gap: 20px;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #aa88ff;
      border-top-color: #ffcc00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* ===== LAYAR PEMILIHAN KARAKTER ===== */
    #characterSelect {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a2a 0%, #1a0a3a 100%);
      z-index: 10000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }
    
    #characterSelect h1 {
      color: #ffcc00;
      font-size: 48px;
      text-shadow: 0 0 20px #ff6600;
      margin-bottom: 50px;
      letter-spacing: 5px;
    }
    
    .char-container {
      display: flex;
      gap: 50px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px;
    }
    
    .char-card {
      width: 280px;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid #666;
    }
    
    .char-card:hover {
      transform: scale(1.05);
      border-color: #ffcc00;
      box-shadow: 0 0 30px rgba(255,204,0,0.3);
    }
    
    .char-card.selected {
      border-color: #00ff00;
      box-shadow: 0 0 30px rgba(0,255,0,0.3);
      background: rgba(0,0,0,0.8);
    }
    
    .char-avatar {
      width: 150px;
      height: 150px;
      margin: 0 auto 20px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }
    
    .char-avatar.miya {
      background-image: url('Avatar1.png');
    }
    
    .char-avatar.shuken {
      background-image: url('ShukenIdle1.png');
    }
    
    .char-name {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    
    .char-name.miya { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
    .char-name.shuken { color: #aa44ff; text-shadow: 0 0 10px #aa44ff; }
    
    .char-stats {
      font-size: 14px;
      color: #ccc;
      text-align: left;
      margin-top: 15px;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
    }
    
    .char-stats span {
      color: #ffcc00;
    }
    
    .btn-start {
      margin-top: 40px;
      padding: 15px 50px;
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(135deg, #ff6600, #ffcc00);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: monospace;
      color: #1a0a2a;
    }
    
    .btn-start:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px #ffcc00;
    }
    
    .btn-start.disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
    }
    
    @media (max-width: 700px) {
      .char-container { gap: 25px; }
      .char-card { width: 250px; padding: 15px; }
      .char-name { font-size: 30px; }
      .char-stats { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-spinner"></div>
    <div>⚡ Loading Shuken... ⚡</div>
  </div>
  
  <div id="characterSelect">
    <h1>⚔️ PILIH KARAKTER ⚔️</h1>
    <div class="char-container">
      <div class="char-card" data-hero="miya" id="cardMiya">
        <div class="char-avatar miya"></div>
        <div class="char-name miya">MIYA</div>
        <div class="char-stats">
          📊 STATS<br>
          ❤️ HP: 150 &nbsp; 💛 MP: 100<br>
          🏃 SPEED: 400 &nbsp; 🏹 ATK: 10<br>
          ⚡ Panah Jarak Jauh
        </div>
      </div>
      <div class="char-card" data-hero="shuken" id="cardShuken">
        <div class="char-avatar shuken"></div>
        <div class="char-name shuken">SHUKEN</div>
        <div class="char-stats">
          📊 STATS<br>
          ❤️ HP: 120 &nbsp; 💛 MP: 100<br>
          🏃 SPEED: 550 &nbsp; 👊 ATK: 35<br>
          ⚡ 3 Skill Petir (SPAM)
        </div>
      </div>
    </div>
    <button class="btn-start disabled" id="btnStart">▶ START GAME ◀</button>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <script src="AdivaClient.js"></script>
  <script src="AdivaServer.js"></script>
  <script src="./data.js"></script>
  <script src="./item.js"></script>
  <script src="./semut.js"></script>
  <script src="./kura.js"></script>
  <script src="./laba.js"></script>
  <script src="./shuken.js"></script>
  
  <script>
    const canvas = document.getElementById("canvas")
    const game = new GameLoop(canvas)
    const gl = game.gl
    const renderer = new Renderer(gl, canvas)
    const utils = new Utils()
    
    const physics = new Collision(150)
    physics.gameState.add("1")
    physics.grid.buildStatic(tembok)
    
    let selectedHero = null
    let loadedTexture = null
    let gameStarted = false
    
    const listImg = {
      idle: { path: "Diam1.png" }, lari1: { path: "Lari1.png" }, lari2: { path: "Lari2.png" }, lari3: { path: "Lari3.png" },
      jump: { path: "Lompat1.png" }, fall: { path: "Turun1.png" }, panah: { path: "Pnh2.png" }, panahMisil: { path: "Misil1.png" },
      wall: { path: "Walll1.png" }, gerbang: { path: "WallRentak1.png" }, buff: { path: "Semut2.png" },
      heal: { path: "Heal1.png" }, energi: { path: "Energi1.png" }, peluruGanda: { path: "PeluruGanda1.png" },
      kelomang: { path: "Kura3.png" }, kelomangDiam: { path: "Kura1.png" }, kelomangNembak: { path: "Kura2.png" },
      guinLari: { path: "LabaLari2.png" }, guinDiam: { path: "LabaLari1.png" }, guinLompat: { path: "LabaNembak1.png" },
      guinUlti: { path: "LabaMakan2.png" }, guinShoot: { path: "LabaNembak2.png" }, bolaGuin: { path: "BolaUlti2.png" },
      shukenIdle: { path: "ShukenIdle1.png" }, shukenRun1: { path: "ShukenRun1.png" }, shukenRun2: { path: "ShukenRun2.png" },
      shukenRun3: { path: "ShukenRun3.png" }, shukenJump: { path: "ShukenJump1.png" }, shukenFall: { path: "ShukenFall1.png" },
      shukenAttack1: { path: "ShukenAttack1.png" }, shukenAttack2: { path: "ShukenAttack2.png" },
      shukenSkill1: { path: "ShukenSkill1.png" }, shukenSkill2: { path: "ShukenSkill2.png" }, shukenUlti: { path: "ShukenUlti1.png" },
      bolaPetir: { path: "BolaPetir1.png" }, petirArea: { path: "PetirArea1.png" }, petirAtas: { path: "PetirAtas1.png" }
    }
    
    const hero = {
      miya: {
        x: 0, y: -800, width: 130, height: 130, hp: 150, maxHp: 150,
        energi: 100, maxEnergi: 100, gravity: 2000, jumpPower: 700,
        useCollider: true, colliderBox: { width: 60, height: 110 },
        useHurtBox: true, hurtBox: { x: 0, y: 0, width: 60, height: 130 },
        vx: 0, vy: 0, scene: "1", isAttack: false, superState: false, superTimer: 0,
        state: "idle", img: "idle", animationDirection: "right",
        statusItem: "", durasiItem: 0, tintColor: "white",
        currentHero: null, canMove: true, canAttack: true
      },
      shuken: {
        x: 0, y: -800, width: 140, height: 150, hp: 120, maxHp: 120,
        energi: 100, maxEnergi: 100, gravity: 2000, jumpPower: 680,
        speed: 550, attackDamage: 35,
        useCollider: true, colliderBox: { width: 65, height: 120 },
        useHurtBox: true, hurtBox: { x: 0, y: 0, width: 65, height: 140 },
        vx: 0, vy: 0, scene: "1", isAttacking: false, isUsingSkill: false,
        superState: false, superTimer: 0, state: "idle", img: "shukenIdle",
        animationDirection: "right", tintColor: "white", currentHero: null,
        canMove: true, canAttack: true
      }
    }
    
    const selectScreen = document.getElementById("characterSelect")
    const loadingDiv = document.getElementById("loading")
    const cardMiya = document.getElementById("cardMiya")
    const cardShuken = document.getElementById("cardShuken")
    const btnStart = document.getElementById("btnStart")
    
    function selectCharacter(heroName) {
      cardMiya.classList.remove("selected")
      cardShuken.classList.remove("selected")
      if (heroName === "miya") cardMiya.classList.add("selected")
      else cardShuken.classList.add("selected")
      btnStart.classList.remove("disabled")
      selectedHero = heroName
    }
    
    cardMiya.onclick = () => selectCharacter("miya")
    cardShuken.onclick = () => selectCharacter("shuken")
    
    btnStart.onclick = async () => {
      if (!selectedHero) return
      selectScreen.style.display = "none"
      loadingDiv.style.display = "flex"
      loadingDiv.innerHTML = '<div class="loading-spinner"></div><div>⚡ Loading Game... ⚡</div>'
      
      const aset = new Aset(gl, listImg)
      loadedTexture = await aset.load()
      loadingDiv.style.display = "none"
      
      hero.miya.currentHero = selectedHero
      hero.shuken.currentHero = selectedHero
      hero.shuken.x = hero.miya.x
      hero.shuken.y = hero.miya.y
      
      startGame()
    }
    
    function startGame() {
      gameStarted = true
      // Game loop sederhana tanpa tombol analog kompleks
      // (kode game loop di sini, tapi terlalu panjang)
      console.log("Game started with:", selectedHero)
      alert("Game mulai! Pilih karakter: " + selectedHero)
    }
    
    // Load assets awal
    (async () => {
      const aset = new Aset(gl, listImg)
      loadedTexture = await aset.load()
      loadingDiv.style.display = "none"
      selectScreen.style.display = "flex"
    })()
  </script>
</body>
</html>
