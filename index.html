<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>ibill vs mosnyer - Pilih Karakter</title>
  <style>
    * {
      margin: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    canvas {
      display: block;
      background: #2a1a3a;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a0a2a;
      color: #aa88ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      font-family: monospace;
      z-index: 9999;
    }
    
    /* ===== LAYAR PEMILIHAN KARAKTER ===== */
    #characterSelect {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a2a 0%, #1a0a3a 100%);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }
    
    #characterSelect h1 {
      color: #ffcc00;
      font-size: 48px;
      text-shadow: 0 0 20px #ff6600;
      margin-bottom: 50px;
      letter-spacing: 5px;
    }
    
    .char-container {
      display: flex;
      gap: 50px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px;
    }
    
    .char-card {
      width: 250px;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid #666;
    }
    
    .char-card:hover {
      transform: scale(1.05);
      border-color: #ffcc00;
      box-shadow: 0 0 30px rgba(255,204,0,0.3);
    }
    
    .char-card.selected {
      border-color: #00ff00;
      box-shadow: 0 0 30px rgba(0,255,0,0.3);
      background: rgba(0,0,0,0.8);
    }
    
    .char-avatar {
      width: 150px;
      height: 150px;
      margin: 0 auto 20px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }
    
    .char-avatar.miya {
      background-image: url('Avatar1.png');
    }
    
    .char-avatar.shuken {
      background-image: url('ShukenIdle1.png');
    }
    
    .char-name {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    
    .char-name.miya { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
    .char-name.shuken { color: #aa44ff; text-shadow: 0 0 10px #aa44ff; }
    
    .char-stats {
      font-size: 12px;
      color: #ccc;
      text-align: left;
      margin-top: 15px;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
    }
    
    .char-stats span {
      color: #ffcc00;
    }
    
    .btn-start {
      margin-top: 50px;
      padding: 15px 50px;
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(135deg, #ff6600, #ffcc00);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: monospace;
      color: #1a0a2a;
    }
    
    .btn-start:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px #ffcc00;
    }
    
    .btn-start.disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
    }
    
    @media (max-width: 600px) {
      .char-container { gap: 20px; }
      .char-card { width: 180px; padding: 10px; }
      .char-avatar { width: 100px; height: 100px; }
      .char-name { font-size: 24px; }
      .char-stats { font-size: 10px; }
      #characterSelect h1 { font-size: 32px; }
      .btn-start { padding: 10px 30px; font-size: 20px; }
    }
  </style>
</head>
<body>
  <div id="loading">
    ⚡ Loading Shuken... ⚡
  </div>
  
  <!-- LAYAR PEMILIHAN KARAKTER -->
  <div id="characterSelect">
    <h1>⚔️ PILIH KARAKTER ⚔️</h1>
    <div class="char-container">
      
      <!-- MIYA CARD -->
      <div class="char-card" data-hero="miya" id="cardMiya">
        <div class="char-avatar miya"></div>
        <div class="char-name miya">MIYA</div>
        <div class="char-stats">
          📊 STATS<br>
          ❤️ HP: 150<br>
          💛 ENERGI: 100<br>
          🏃 SPEED: 400<br>
          🏹 ATK: 10 (arrow)<br>
          ⚡ SKILL: Panah Jarak Jauh
        </div>
      </div>
      
      <!-- SHUKEN CARD -->
      <div class="char-card" data-hero="shuken" id="cardShuken">
        <div class="char-avatar shuken"></div>
        <div class="char-name shuken">SHUKEN</div>
        <div class="char-stats">
          📊 STATS<br>
          ❤️ HP: 120<br>
          💛 ENERGI: 100<br>
          🏃 SPEED: 550<br>
          👊 ATK: 35<br>
          ⚡ SKILL: Petir (3 skills)
        </div>
      </div>
      
    </div>
    <button class="btn-start disabled" id="btnStart">▶ START GAME ◀</button>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <script src="AdivaClient.js"></script>
  <script src="AdivaServer.js"></script>
  <script src="./data.js"></script>
  <script src="./item.js"></script>
  <script src="./semut.js"></script>
  <script src="./kura.js"></script>
  <script src="./laba.js"></script>
  <script src="./shuken.js"></script>
  
  <script>
    const canvas = document.getElementById("canvas")
    const game = new GameLoop(canvas)
    const gl = game.gl
    const renderer = new Renderer(gl, canvas)
    const utils = new Utils()
    
    const physics = new Collision(150)
    physics.gameState.add("1")
    physics.grid.buildStatic(tembok)
    
    // ===== VARIABEL KARAKTER TERPILIH =====
    let selectedHero = null  // "miya" atau "shuken"
    
    // ===== ASET GAMBAR =====
    const listImg = {
      // Miya assets
      idle: { path: "Diam1.png" },
      lari1: { path: "Lari1.png" },
      lari2: { path: "Lari2.png" },
      lari3: { path: "Lari3.png" },
      jump: { path: "Lompat1.png" },
      fall: { path: "Turun1.png" },
      panah: { path: "Pnh2.png" },
      panahMisil: { path: "Misil1.png" },
      
      // Wall & environment
      wall: { path: "Walll1.png" },
      gerbang: { path: "WallRentak1.png" },
      
      // Items & buffs
      buff: { path: "Semut2.png" },
      heal: { path: "Heal1.png" },
      energi: { path: "Energi1.png" },
      peluruGanda: { path: "PeluruGanda1.png" },
      
      // Kelomang (kura)
      kelomang: { path: "Kura3.png" },
      kelomangDiam: { path: "Kura1.png" },
      kelomangNembak: { path: "Kura2.png" },
      
      // Guinevere (laba)
      guinLari: { path: "LabaLari2.png" },
      guinDiam: { path: "LabaLari1.png" },
      guinLompat: { path: "LabaNembak1.png" },
      guinUlti: { path: "LabaMakan2.png" },
      guinShoot: { path: "LabaNembak2.png" },
      bolaGuin: { path: "BolaUlti2.png" },
      
      // ===== SHUKEN ASSETS =====
      shukenIdle: { path: "ShukenIdle1.png" },
      shukenRun1: { path: "ShukenRun1.png" },
      shukenRun2: { path: "ShukenRun2.png" },
      shukenRun3: { path: "ShukenRun3.png" },
      shukenJump: { path: "ShukenJump1.png" },
      shukenFall: { path: "ShukenFall1.png" },
      shukenAttack1: { path: "ShukenAttack1.png" },
      shukenAttack2: { path: "ShukenAttack2.png" },
      shukenSkill1: { path: "ShukenSkill1.png" },
      shukenSkill2: { path: "ShukenSkill2.png" },
      shukenUlti: { path: "ShukenUlti1.png" },
      bolaPetir: { path: "BolaPetir1.png" },
      petirArea: { path: "PetirArea1.png" },
      petirAtas: { path: "PetirAtas1.png" }
    }
    
    // ===== DATA HERO =====
    const hero = {
      miya: {
        x: 0,
        y: -800,
        width: 100,
        height: 100,
        hp: 150,
        maxHp: 150,
        energi: 100,
        maxEnergi: 100,
        gravity: 2000,
        jumpPower: 700,
        useCollider: true,
        colliderBox: { width: 50, height: 100 },
        useHurtBox: true,
        hurtBox: { x: 0, y: 0, width: 50, height: 120 },
        vx: 0,
        vy: 0,
        scene: "1",
        isAttack: false,
        superState: false,
        superTimer: 0,
        state: "idle",
        img: "idle",
        animationDirection: "right",
        statusItem: "",
        durasiItem: 0,
        tintColor: "white",
        currentHero: null
      },
      shuken: {
        x: 0,
        y: -800,
        width: 100,
        height: 110,
        hp: 120,
        maxHp: 120,
        energi: 100,
        maxEnergi: 100,
        gravity: 2000,
        jumpPower: 680,
        speed: 550,
        attackDamage: 35,
        useCollider: true,
        colliderBox: { width: 50, height: 100 },
        useHurtBox: true,
        hurtBox: { x: 0, y: 0, width: 50, height: 120 },
        vx: 0,
        vy: 0,
        scene: "1",
        isAttacking: false,
        isUsingSkill: false,
        skill1Cooldown: 0,
        skill2Cooldown: 0,
        ultiCooldown: 0,
        superState: false,
        superTimer: 0,
        state: "idle",
        img: "shukenIdle",
        animationDirection: "right",
        tintColor: "white",
        currentHero: null
      }
    }
    
    // HP Bar & Mana Bar (sementara, nanti di-update setelah pilih karakter)
    const hpBar = new VirtualBarDiv({
      value: 100,
      maxValue: 100,
      width: 150,
      height: 15,
      top: 38,
      left: 82,
      fillColor: "lime",
      visualColor: "maroon",
      background: "#222",
      border: "1px solid black",
      lerpSpeed: 5
    })
    
    const manaBar = new VirtualBarDiv({
      value: 100,
      maxValue: 100,
      width: 150,
      height: 10,
      top: 55,
      left: 82,
      fillColor: "yellow",
      visualColor: "aqua",
      background: "#222",
      border: "1px solid black",
      lerpSpeed: 5
    })
    
    hpBar.el.style.display = "none"
    manaBar.el.style.display = "none"
    
    // ===== LOGIKA PEMILIHAN KARAKTER =====
    const cardMiya = document.getElementById("cardMiya")
    const cardShuken = document.getElementById("cardShuken")
    const btnStart = document.getElementById("btnStart")
    const selectScreen = document.getElementById("characterSelect")
    
    let selectedCard = null
    
    function selectCharacter(heroName) {
      // Hapus class selected dari semua card
      cardMiya.classList.remove("selected")
      cardShuken.classList.remove("selected")
      
      // Tambah class selected ke card yang dipilih
      if (heroName === "miya") {
        cardMiya.classList.add("selected")
        selectedCard = "miya"
      } else if (heroName === "shuken") {
        cardShuken.classList.add("selected")
        selectedCard = "shuken"
      }
      
      // Enable tombol start
      btnStart.classList.remove("disabled")
      selectedHero = heroName
    }
    
    cardMiya.onclick = () => selectCharacter("miya")
    cardShuken.onclick = () => selectCharacter("shuken")
    
    btnStart.onclick = () => {
      if (!selectedHero) return
      
      // Sembunyikan layar pilih karakter
      selectScreen.style.display = "none"
      
      // Set karakter terpilih sebagai active
      hero.miya.currentHero = selectedHero
      hero.shuken.currentHero = selectedHero
      
      // Set posisi kedua karakter sama
      hero.shuken.x = hero.miya.x
      hero.shuken.y = hero.miya.y
      
      // Update HP dan Mana Bar sesuai karakter terpilih
      if (selectedHero === "miya") {
        hpBar.setMaxValue(hero.miya.maxHp)
        hpBar.setValue(hero.miya.hp)
        manaBar.setMaxValue(hero.miya.maxEnergi)
        manaBar.setValue(hero.miya.energi)
      } else {
        hpBar.setMaxValue(hero.shuken.maxHp)
        hpBar.setValue(hero.shuken.hp)
        manaBar.setMaxValue(hero.shuken.maxEnergi)
        manaBar.setValue(hero.shuken.energi)
      }
      
      hpBar.el.style.display = "block"
      manaBar.el.style.display = "block"
      
      // Mulai game (inisialisasi tombol dll)
      initGame()
    }
    
    // ===== TOMBOH-Tombol (akan dibuat setelah start) =====
    let tombolKiri, tombolKanan, tombolLompat
    let tombolPanah, tombolSwitchKeShuken, tombolSwitchKeMiya
    let tombolShukenAttack, tombolShukenSkill1, tombolShukenSkill2, tombolShukenUlti
    
    let listPanahMiya = {}
    
    // Animasi variables
    let lariFrame = 1
    let lariTimer = 0
    let lariFrameShuken = 1
    let lariTimerShuken = 0
    const lariSpeed = 0.15
    
    const baseAnimasi = {
      idle: "idle",
      run: "run",
      jump: "jump",
      fall: "fall",
      panah: "panah"
    }
    
    let dtGlobal = 0
    
    function initGame() {
      // ===== TOMBOL MOVEMENT =====
      tombolKiri = new VirtualButton({
        text: "←",
        bottom: 15,
        left: 30,
        onPress: () => tombolKiri.press = true,
        onRelease: () => tombolKiri.press = false
      })
      
      tombolKanan = new VirtualButton({
        text: "→",
        bottom: 15,
        left: 120,
        onPress: () => tombolKanan.press = true,
        onRelease: () => tombolKanan.press = false
      })
      
      tombolLompat = new VirtualButton({
        text: "↑",
        bottom: 100,
        right: 200,
        onPress: () => {
          const activeHero = selectedHero === "miya" ? hero.miya : hero.shuken
          activeHero.jumpBufferTimer = 0.15
        }
      })
      
      // ===== TOMBOL MIYA (Panah) =====
      tombolPanah = new VirtualButton({
        img: "Misil1.png",
        bottom: 100,
        right: 20,
        onPress: () => {
          if (selectedHero !== "miya") return
          const miya = hero.miya
          if (miya.energi <= 0) return
          if (miya.isAttack) return
          miya.isAttack = true
          miya.energi -= 2
          manaBar.setValue(miya.energi)
          miya.superState = true
          miya.state = "panah"
          
          const id = crypto.randomUUID()
          listPanahMiya[id] = {
            id: id,
            x: miya.x + miya.width/2 - 15,
            y: miya.y + miya.height/3,
            width: miya.statusItem === "peluruGanda" ? 50 : 30,
            height: miya.statusItem === "peluruGanda" ? 50 : 30,
            scene: miya.scene,
            dir: miya.animationDirection === "right" ? 1 : -1,
            dirY: miya.statusItem === "peluruGanda" ? utils.rand(-0.5, 0.5) : 0,
            animationDirection: miya.animationDirection,
            speed: 500,
            lifeTime: 3,
            img: "panahMisil"
          }
          miya.superTimer = 0.1
        },
        onRelease: () => {
          if (selectedHero !== "miya") return
          hero.miya.isAttack = false
        }
      })
      
      // ===== TOMBOL SHUKEN =====
      tombolShukenAttack = new VirtualButton({
        text: "👊",
        bottom: 160,
        right: 20,
        background: "rgba(200,100,50,0.8)",
        onPress: () => {
          if (selectedHero !== "shuken") return
          const player = hero.shuken
          if (player.isAttacking || player.isUsingSkill) return
          shukenBasicAttack(player, dtGlobal, utils, physics)
        }
      })
      
      tombolShukenSkill1 = new VirtualButton({
        text: "⚡",
        bottom: 100,
        right: 20,
        background: "rgba(100,50,200,0.8)",
        fontSize: 28,
        onPress: () => {
          if (selectedHero !== "shuken") return
          const player = hero.shuken
          if (player.skill1Cooldown > 0) return
          if (player.energi < 12) return
          if (player.isAttacking || player.isUsingSkill) return
          shukenSkill1BolaListrik(player, dtGlobal, utils)
        }
      })
      
      tombolShukenSkill2 = new VirtualButton({
        text: "🌩️",
        bottom: 100,
        right: 110,
        background: "rgba(150,50,200,0.8)",
        fontSize: 24,
        onPress: () => {
          if (selectedHero !== "shuken") return
          const player = hero.shuken
          if (player.skill2Cooldown > 0) return
          if (player.energi < 25) return
          if (player.isAttacking || player.isUsingSkill) return
          shukenSkill2PetirArea(player, dtGlobal, utils)
        }
      })
      
      tombolShukenUlti = new VirtualButton({
        text: "💜⚡",
        bottom: 160,
        right: 110,
        background: "rgba(200,50,255,0.9)",
        fontSize: 20,
        onPress: () => {
          if (selectedHero !== "shuken") return
          const player = hero.shuken
          if (player.ultiCooldown > 0) return
          if (player.energi < 50) return
          if (player.isAttacking || player.isUsingSkill) return
          shukenUltiPetirAtas(player, dtGlobal, utils)
        }
      })
      
      // Mulai game loop
      startGameLoop()
    }
    
    // Asset & Draw
    let aset, listDraw, listUpdateDraw
    
    async function startGameLoop() {
      const loading = document.getElementById("loading")
      aset = new Aset(gl, listImg)
      const texture = await aset.load()
      loading.style.display = "none"
      
      listDraw = [hero, tembok, listPanahMiya, buff, kelomang, bulletKelomang, guin, peluruGuin, drawItem, bolaPetir, petirArea, petirAtas]
      listUpdateDraw = []
      
      listDraw.forEach(entitas => {
        listUpdateDraw.push(new Draw(entitas, texture, renderer, physics.gameState))
      })
      
      // Dialog
      const dialog = new VirtualLyrics(canvas)
        .startX(10)
        .startY(100)
        .color("white")
        .fill("ibill .....")
        .fill("kesadaran yg engkau miliki")
        .fill("menjadikan dirimu sebagai puncak")
        .fill("rantai makanan")
        .fill("tetap tenang, dan terus maju")
      
      // UI Text
      const text = new VirtualText({
        text: selectedHero === "miya" ? "MIYA" : "SHUKEN",
        color: selectedHero === "miya" ? "#00ff88" : "#aa44ff",
        fontSize: 25,
        padding: "2px 10px",
        textShadow: "2px 1px 1px black",
        top: 5,
        left: 70
      })
      
      const text2 = new VirtualText({
        text: "support development via DANA",
        color: "white",
        fontSize: 10,
        padding: "2px 10px",
        textShadow: "2px 1px 1px blue",
        top: 5,
        right: 5
      })
      
      const text3 = new VirtualText({
        text: "0821-1602-3162",
        color: "white",
        fontSize: 10,
        padding: "2px 10px",
        textShadow: "2px 1px 1px black",
        top: 20,
        right: 5
      })
      
      const avatar = new VirtualImg({
        src: selectedHero === "miya" ? "Avatar1.png" : "ShukenIdle1.png",
        width: 70, height: 70,
        top: 5, left: 5,
        borderRadius: "50%",
        background: "#eee",
        border: "1px solid white"
      })
      
      game.render(dt => {
        dtGlobal = dt
        physics.grid.buildDynamic(buff, kelomang, bulletKelomang, guin, peluruGuin, drawItem, bolaPetir, petirArea, petirAtas)
        
        dialog.play(dt)
        
        // Camera follow active hero
        const activeHeroObj = selectedHero === "miya" ? hero.miya : hero.shuken
        game.cameraOn({ active: activeHeroObj }, "active")
        
        for (let entitas of listUpdateDraw) {
          entitas.update(dt, game.camera)
        }
        
        // ===== MIYA LOGIC (jika terpilih) =====
        if (selectedHero === "miya") {
          const miya = hero.miya
          
          if (miya.state === "run") {
            lariTimer += dt
            if (lariTimer >= lariSpeed) {
              lariTimer = 0
              lariFrame++
              if (lariFrame > 3) lariFrame = 1
            }
            miya.img = `lari${lariFrame}`
          } else {
            miya.img = baseAnimasi[miya.state] || "idle"
            lariTimer = 0
            lariFrame = 1
          }
          
          utils.timer(dt, "timeColorMiya", 0.5, () => {
            miya.tintColor = "white"
          })
          
          if (tombolKanan.press) {
            miya.vx = 400
          } else if (tombolKiri.press) {
            miya.vx = -400
          } else miya.vx = 0
          
          physics.applyPhysics(dt, miya)
          physics.platformerLogic(dt, miya)
          miya.vy += miya.gravity * dt
          utils.activeHurtBox(miya)
          
          if (miya.superTimer > 0) {
            miya.superTimer -= dt
            if (miya.superTimer <= 0) miya.superState = false
          }
          
          miya.energi = Math.min(miya.maxEnergi, miya.energi + 1 * dt)
          manaBar.setValue(miya.energi)
          
          for (let id in listPanahMiya) {
            let panah = listPanahMiya[id]
            panah.x += panah.dir * panah.speed * dt
            panah.y += panah.dirY * panah.speed * dt
            panah.lifeTime -= dt
            if (panah.lifeTime <= 0) delete listPanahMiya[panah.id]
          }
          
          panahMiyaVsMonster(dt, listPanahMiya, physics)
          miyaVsMonster(dt, hero, hpBar, physics)
          panahMiyaVsKelomang(dt, listPanahMiya, physics)
          miyaVsKelomang(dt, hero, hpBar, physics)
          panahMiyaVsGuin(dt, listPanahMiya, physics)
          
          if (miya.vy > 3000 || miya.hp <= 0) {
            resetGame(miya)
          }
        }
        
        // ===== SHUKEN LOGIC (jika terpilih) =====
        if (selectedHero === "shuken") {
          const shukenHero = hero.shuken
          
          if (tombolKanan.press) {
            shukenHero.vx = shukenHero.speed
          } else if (tombolKiri.press) {
            shukenHero.vx = -shukenHero.speed
          } else shukenHero.vx = 0
          
          physics.applyPhysics(dt, shukenHero)
          physics.platformerLogic(dt, shukenHero)
          shukenHero.vy += shukenHero.gravity * dt
          utils.activeHurtBox(shukenHero)
          
          logikaShuken(dt, hero, hpBar, manaBar, physics, utils)
          
          if (shukenHero.state === "run" && !shukenHero.superState) {
            lariTimerShuken += dt
            if (lariTimerShuken >= lariSpeed) {
              lariTimerShuken = 0
              lariFrameShuken++
              if (lariFrameShuken > 3) lariFrameShuken = 1
            }
            shukenHero.img = `shukenRun${lariFrameShuken}`
          } else if (!shukenHero.superState) {
            if (shukenHero.state === "jump") shukenHero.img = "shukenJump"
            else if (shukenHero.state === "fall") shukenHero.img = "shukenFall"
            else if (shukenHero.state === "idle") shukenHero.img = "shukenIdle"
          }
          
          if (shukenHero.skill1Cooldown > 0) shukenHero.skill1Cooldown -= dt
          if (shukenHero.skill2Cooldown > 0) shukenHero.skill2Cooldown -= dt
          if (shukenHero.ultiCooldown > 0) shukenHero.ultiCooldown -= dt
          
          updateBolaPetir(dt, physics)
          updatePetirArea(dt, physics)
          updatePetirAtas(dt, physics)
          
          shukenVsMusuh(dt, hero, hpBar, physics)
          
          if (shukenHero.vy > 3000 || shukenHero.hp <= 0) {
            resetGame(shukenHero)
          }
        }
        
        // ===== COMMON MONSTER LOGIC =====
        const currentPlayer = selectedHero === "miya" ? hero.miya : hero.shuken
        
        for (let id in buff) {
          const monster = buff[id]
          logikaMonsterJungler(dt, currentPlayer, monster, physics)
          hpMonster(dt, monster, game.camera, renderer)
        }
        
        logikaKelomang(dt, currentPlayer, physics)
        updateBulletKelomang(dt, physics)
        Object.values(kelomang).forEach(el => hpKelomang(dt, el, game.camera, renderer))
        Object.values(guin).forEach(el => hpGuin(dt, el, game.camera, renderer))
        
        anakKelomangVsMiya(dt, hero, hpBar, physics)
        logikaGuinevere(dt, hero, hpBar, physics, utils)
        updatePeluruGuin(dt)
        peluruGuinVsMiya(dt, hero, hpBar, physics)
        
        miyaMengambilItem(hero, physics)
        miyaMenerimaEfekItem(hpBar, manaBar, hero, dt, utils)
      })
    }
    
    function resetGame(playerObj) {
      Object.values(tembok).forEach(wl => {
        if (wl.img === "gerbang") wl.scene = "1"
      })
      Object.values({...kelomang, ...buff, ...guin}).forEach(el => {
        el.x = el.originalX
        el.y = el.originalY
        el.hp = el.originalHp
        el.scene = "1"
        el.isChase = false
        el.isDead = false
        el.vx = 0
      })
      playerObj.vy = 0
      playerObj.x = 0
      playerObj.y = 0
      playerObj.hp = playerObj.maxHp
      playerObj.energi = playerObj.maxEnergi
      hpBar.setValue(playerObj.hp)
      manaBar.setValue(playerObj.energi)
    }
    
    // Loading screen tetap terlihat sampai user pilih karakter
    document.getElementById("loading").style.display = "flex"
    document.getElementById("loading").innerHTML = "⚡ PILIH KARAKTER DULU ⚡"
    
    // Tampilkan layar pilih karakter, loading tetap ada sampai user pilih?
    // Biarkan loading tetap, nanti hilang saat start
    const loadingDiv = document.getElementById("loading")
    loadingDiv.style.display = "none"  // Sembunyikan loading, tampilkan select screen
  </script>
