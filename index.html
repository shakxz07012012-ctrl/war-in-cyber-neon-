<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>⚡ ibill vs mosnyer - Battle Arena ⚔️</title>
  <style>
    * {
      margin: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    body {
      background: #0a0a2a;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      background: linear-gradient(180deg, #1a1a3a 0%, #2a1a3a 100%);
      width: 100%;
      height: 100%;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a0a2a;
      color: #aa88ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      font-family: monospace;
      z-index: 9999;
      flex-direction: column;
      gap: 20px;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #aa88ff;
      border-top-color: #ffcc00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #characterSelect {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a2a 0%, #1a0a3a 100%);
      z-index: 10000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }
    
    #characterSelect h1 {
      color: #ffcc00;
      font-size: 42px;
      text-shadow: 0 0 20px #ff6600;
      margin-bottom: 40px;
      letter-spacing: 5px;
      animation: glow 2s ease-in-out infinite;
    }
    
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 20px #ff6600; }
      50% { text-shadow: 0 0 40px #ffcc00; }
    }
    
    .char-container {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px;
    }
    
    .char-card {
      width: 220px;
      padding: 15px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid #666;
      backdrop-filter: blur(5px);
    }
    
    .char-card:hover {
      transform: scale(1.05);
      border-color: #ffcc00;
      box-shadow: 0 0 30px rgba(255,204,0,0.3);
    }
    
    .char-card.selected {
      border-color: #00ff00;
      box-shadow: 0 0 30px rgba(0,255,0,0.3);
      background: rgba(0,0,0,0.8);
    }
    
    .char-avatar {
      width: 130px;
      height: 130px;
      margin: 0 auto 15px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }
    
    .char-avatar.miya { background-image: url('Avatar1.png'); }
    .char-avatar.shuken { background-image: url('ShukenIdle1.png'); }
    
    .char-name {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    
    .char-name.miya { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
    .char-name.shuken { color: #aa44ff; text-shadow: 0 0 10px #aa44ff; }
    
    .char-stats {
      font-size: 11px;
      color: #ccc;
      text-align: left;
      margin-top: 10px;
      padding: 8px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
    }
    
    .char-stats span { color: #ffcc00; }
    
    .btn-start-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 35px;
    }
    
    .btn-start {
      padding: 12px 45px;
      font-size: 22px;
      font-weight: bold;
      background: linear-gradient(135deg, #ff6600, #ffcc00);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: monospace;
      color: #1a0a2a;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    
    .btn-start:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px #ffcc00;
    }
    
    .btn-start.disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
      box-shadow: none;
    }
    
    @media (max-width: 600px) {
      .char-container { gap: 20px; }
      .char-card { width: 170px; padding: 10px; }
      .char-avatar { width: 100px; height: 100px; }
      .char-name { font-size: 22px; }
      .char-stats { font-size: 9px; padding: 6px; }
      #characterSelect h1 { font-size: 28px; margin-bottom: 25px; }
      .btn-start { padding: 10px 35px; font-size: 18px; }
      .btn-start-wrapper { margin-top: 25px; }
    }
    
    @media (max-width: 450px) {
      .char-card { width: 145px; }
      .char-avatar { width: 80px; height: 80px; }
      .char-name { font-size: 18px; }
      .char-stats { font-size: 8px; }
      .char-container { gap: 15px; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-spinner"></div>
    <div>⚡ Loading Assets... ⚡</div>
  </div>
  
  <div id="characterSelect">
    <h1>⚔️ PILIH KARAKTER ⚔️</h1>
    <div class="char-container">
      <div class="char-card" data-hero="miya" id="cardMiya">
        <div class="char-avatar miya"></div>
        <div class="char-name miya">MIYA</div>
        <div class="char-stats">
          📊 STATS<br>❤️ HP: 150<br>💛 ENERGI: 100<br>🏃 SPEED: 400<br>🏹 ATK: 10<br>⚡ SKILL: Panah
        </div>
      </div>
      
      <div class="char-card" data-hero="shuken" id="cardShuken">
        <div class="char-avatar shuken"></div>
        <div class="char-name shuken">SHUKEN</div>
        <div class="char-stats">
          📊 STATS<br>❤️ HP: 120<br>💛 ENERGI: 100<br>🏃 SPEED: 550<br>👊 ATK: 35<br>⚡ SKILL: 3 Petir
        </div>
      </div>
    </div>
    <div class="btn-start-wrapper">
      <button class="btn-start disabled" id="btnStart">▶ START GAME ◀</button>
    </div>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <script src="AdivaClient.js"></script>
  <script src="AdivaServer.js"></script>
  <script src="./data.js"></script>
  <script src="./item.js"></script>
  <script src="./semut.js"></script>
  <script src="./kura.js"></script>
  <script src="./laba.js"></script>
  <script src="./shuken.js"></script>
  <script src="AnalogController.js"></script>
  
  <script>
    (function() {
      const canvas = document.getElementById("canvas")
      const game = new GameLoop(canvas)
      const gl = game.gl
      const renderer = new Renderer(gl, canvas)
      const utils = new Utils()
      
      const physics = new Collision(150)
      physics.gameState.add("1")
      physics.grid.buildStatic(tembok)
      
      let selectedHero = null
      let loadedTexture = null
      let gameController = null
      
      const listImg = {
        idle: { path: "Diam1.png" },
        lari1: { path: "Lari1.png" },
        lari2: { path: "Lari2.png" },
        lari3: { path: "Lari3.png" },
        jump: { path: "Lompat1.png" },
        fall: { path: "Turun1.png" },
        panah: { path: "Pnh2.png" },
        panahMisil: { path: "Misil1.png" },
        wall: { path: "Walll1.png" },
        gerbang: { path: "WallRentak1.png" },
        buff: { path: "Semut2.png" },
        heal: { path: "Heal1.png" },
        energi: { path: "Energi1.png" },
        peluruGanda: { path: "PeluruGanda1.png" },
        kelomang: { path: "Kura3.png" },
        kelomangDiam: { path: "Kura1.png" },
        kelomangNembak: { path: "Kura2.png" },
        guinLari: { path: "LabaLari2.png" },
        guinDiam: { path: "LabaLari1.png" },
        guinLompat: { path: "LabaNembak1.png" },
        guinUlti: { path: "LabaMakan2.png" },
        guinShoot: { path: "LabaNembak2.png" },
        bolaGuin: { path: "BolaUlti2.png" },
        shukenIdle: { path: "ShukenIdle1.png" },
        shukenRun1: { path: "ShukenRun1.png" },
        shukenRun2: { path: "ShukenRun2.png" },
        shukenRun3: { path: "ShukenRun3.png" },
        shukenJump: { path: "ShukenJump1.png" },
        shukenFall: { path: "ShukenFall1.png" },
        shukenAttack1: { path: "ShukenAttack1.png" },
        shukenAttack2: { path: "ShukenAttack2.png" },
        shukenSkill1: { path: "ShukenSkill1.png" },
        shukenSkill2: { path: "ShukenSkill2.png" },
        shukenUlti: { path: "ShukenUlti1.png" },
        bolaPetir: { path: "BolaPetir1.png" },
        petirArea: { path: "PetirArea1.png" },
        petirAtas: { path: "PetirAtas1.png" }
      }
      
      const hero = {
        miya: {
          x: 0, y: -800, width: 130, height: 130,
          hp: 150, maxHp: 150, energi: 100, maxEnergi: 100,
          gravity: 2000, jumpPower: 700, speed: 400,
          useCollider: true, colliderBox: { width: 60, height: 110 },
          useHurtBox: true, hurtBox: { x: 0, y: 0, width: 60, height: 130 },
          vx: 0, vy: 0, scene: "1",
          isAttack: false, superState: false, superTimer: 0,
          state: "idle", img: "idle", animationDirection: "right",
          statusItem: "", durasiItem: 0, tintColor: "white",
          currentHero: "miya", canMove: true, canAttack: true
        },
        shuken: {
          x: 0, y: -800, width: 140, height: 150,
          hp: 120, maxHp: 120, energi: 100, maxEnergi: 100,
          gravity: 2000, jumpPower: 680, speed: 550, attackDamage: 35,
          useCollider: true, colliderBox: { width: 65, height: 120 },
          useHurtBox: true, hurtBox: { x: 0, y: 0, width: 65, height: 140 },
          vx: 0, vy: 0, scene: "1",
          isAttacking: false, isUsingSkill: false,
          superState: false, superTimer: 0,
          state: "idle", img: "shukenIdle", animationDirection: "right",
          tintColor: "white", currentHero: "shuken", canMove: true, canAttack: true
        }
      }
      
      // HP & MP Bars
      const hpBar = new VirtualBarDiv({
        value: 100, maxValue: 100, width: 200, height: 18,
        top: 15, left: 85, fillColor: "lime", visualColor: "maroon",
        background: "#222", border: "2px solid black", lerpSpeed: 5
      })
      
      const manaBar = new VirtualBarDiv({
        value: 100, maxValue: 100, width: 200, height: 12,
        top: 38, left: 85, fillColor: "#ffcc00", visualColor: "#aa8800",
        background: "#222", border: "1px solid black", lerpSpeed: 5
      })
      
      hpBar.el.style.position = "fixed"
      hpBar.el.style.zIndex = "10001"
      hpBar.el.style.display = "none"
      manaBar.el.style.position = "fixed"
      manaBar.el.style.zIndex = "10001"
      manaBar.el.style.display = "none"
      
      let listPanahMiya = {}
      let listUpdateDraw = []
      let dialog, text, text2, text3, avatar
      let lariFrame = 1, lariTimer = 0, lariFrameShuken = 1, lariTimerShuken = 0
      const lariSpeed = 0.12
      const baseAnimasi = { idle: "idle", run: "run", jump: "jump", fall: "fall", panah: "panah" }
      
      const cardMiya = document.getElementById("cardMiya")
      const cardShuken = document.getElementById("cardShuken")
      const btnStart = document.getElementById("btnStart")
      const selectScreen = document.getElementById("characterSelect")
      const loadingDiv = document.getElementById("loading")
      
      function selectCharacter(heroName) {
        cardMiya.classList.remove("selected")
        cardShuken.classList.remove("selected")
        if (heroName === "miya") cardMiya.classList.add("selected")
        else if (heroName === "shuken") cardShuken.classList.add("selected")
        btnStart.classList.remove("disabled")
        selectedHero = heroName
      }
      
      cardMiya.onclick = () => selectCharacter("miya")
      cardShuken.onclick = () => selectCharacter("shuken")
      
      btnStart.onclick = () => {
        if (!selectedHero) return
        selectScreen.style.display = "none"
        
        hpBar.el.style.display = "block"
        manaBar.el.style.display = "block"
        
        if (selectedHero === "miya") {
          hpBar.setMaxValue(hero.miya.maxHp)
          hpBar.setValue(hero.miya.hp)
          manaBar.setMaxValue(hero.miya.maxEnergi)
          manaBar.setValue(hero.miya.energi)
        } else {
          hpBar.setMaxValue(hero.shuken.maxHp)
          hpBar.setValue(hero.shuken.hp)
          manaBar.setMaxValue(hero.shuken.maxEnergi)
          manaBar.setValue(hero.shuken.energi)
        }
        
        startGameAfterLoad()
      }
      
      function initGame() {
        if (gameController) gameController.destroy()
        
        gameController = new GameController(selectedHero, {
          onMove: (data) => {
            const activeHero = selectedHero === "miya" ? hero.miya : hero.shuken
            if (activeHero.canMove && !activeHero.superState) {
              activeHero.moveAnalog = data.dx
              // Update animation direction
              if (Math.abs(data.dx) > 0.1) {
                activeHero.animationDirection = data.dx > 0 ? "right" : "left"
              }
            }
          },
          onMoveStop: () => {
            const activeHero = selectedHero === "miya" ? hero.miya : hero.shuken
            activeHero.moveAnalog = 0
          },
          onJump: () => {
            const activeHero = selectedHero === "miya" ? hero.miya : hero.shuken
            if (activeHero.canMove && !activeHero.superState) {
              activeHero.jumpBufferTimer = 0.15
            }
          },
          onAttack: () => {
            if (selectedHero === "miya") {
              const miya = hero.miya
              if (miya.superState) return
              if (miya.energi < 5) return
              miya.isAttack = true
              miya.canMove = false
              miya.energi -= 5
              manaBar.setValue(miya.energi)
              miya.superState = true
              miya.state = "panah"
              const id = crypto.randomUUID()
              listPanahMiya[id] = {
                id, x: miya.x + miya.width/2 - 15, y: miya.y + miya.height/3,
                width: miya.statusItem === "peluruGanda" ? 60 : 40,
                height: miya.statusItem === "peluruGanda" ? 60 : 40,
                scene: miya.scene, dir: miya.animationDirection === "right" ? 1 : -1,
                dirY: miya.statusItem === "peluruGanda" ? utils.rand(-0.5, 0.5) : 0,
                speed: 500, lifeTime: 3, img: "panahMisil"
              }
              miya.superTimer = 0.25
            } else if (selectedHero === "shuken") {
              const player = hero.shuken
              if (player.superState) return
              if (player.energi < 5) return
              player.isAttacking = true
              player.canMove = false
              player.energi -= 5
              manaBar.setValue(player.energi)
              player.superState = true
              player.state = "attack"
              player.img = "shukenAttack1"
              player.superTimer = 0.25
            }
          },
          onSkill1: () => {
            if (selectedHero === "shuken") {
              const player = hero.shuken
              if (player.superState) return
              if (player.energi < 12) return
              player.isUsingSkill = true
              player.canMove = false
              player.energi -= 12
              manaBar.setValue(player.energi)
              player.superState = true
              player.state = "skill1"
              player.img = "shukenSkill1"
              const id = crypto.randomUUID()
              bolaPetir[id] = {
                id, x: player.x + player.width/2 - 20, y: player.y + player.height/3,
                width: 45, height: 45, scene: "1",
                dir: player.animationDirection === "right" ? 1 : -1,
                speed: 600, damage: 20, lifeTime: 2, img: "bolaPetir"
              }
              player.superTimer = 0.35
            }
          },
          onSkill2: () => {
            if (selectedHero === "shuken") {
              const player = hero.shuken
              if (player.superState) return
              if (player.energi < 25) return
              player.isUsingSkill = true
              player.canMove = false
              player.energi -= 25
              manaBar.setValue(player.energi)
              player.superState = true
              player.state = "skill2"
              player.img = "shukenSkill2"
              const areaX = player.animationDirection === "right" ? player.x + player.width + 20 : player.x - 140
              const areaY = player.y + player.height/2
              const id = crypto.randomUUID()
              petirArea[id] = {
                id, x: areaX, y: areaY - 60, width: 140, height: 120,
                scene: "1", damage: 30, lifeTime: 0.35, img: "petirArea"
              }
              player.superTimer = 0.4
            }
          },
          onUlti: () => {
            if (selectedHero === "shuken") {
              const player = hero.shuken
              if (player.superState) return
              if (player.energi < 50) return
              player.isUsingSkill = true
              player.canMove = false
              player.energi -= 50
              manaBar.setValue(player.energi)
              player.superState = true
              player.state = "ulti"
              player.img = "shukenUlti"
              const targetX = player.animationDirection === "right" ? player.x + player.width + 50 : player.x - 150
              const id = crypto.randomUUID()
              petirAtas[id] = {
                id, x: targetX, y: -50, width: 120, height: 850,
                scene: "1", damage: 60, lifeTime: 0.5, img: "petirAtas", isFalling: true
              }
              player.superTimer = 0.6
            }
          }
        })
        
        startGameLoop()
      }
      
      let listDraw
      
      function startGameLoop() {
        listDraw = [hero, tembok, listPanahMiya, buff, kelomang, bulletKelomang, guin, peluruGuin, drawItem, bolaPetir, petirArea, petirAtas]
        listUpdateDraw = []
        listDraw.forEach(entitas => { listUpdateDraw.push(new Draw(entitas, loadedTexture, renderer, physics.gameState)) })
        
        dialog = new VirtualLyrics(canvas).startX(10).startY(100).color("white")
          .fill("ibill .....").fill("kesadaran yg engkau miliki").fill("menjadikan dirimu sebagai puncak").fill("rantai makanan").fill("tetap tenang, dan terus maju")
        
        text = new VirtualText({ text: selectedHero === "miya" ? "MIYA" : "SHUKEN", color: selectedHero === "miya" ? "#00ff88" : "#aa44ff", fontSize: 24, padding: "2px 10px", textShadow: "2px 1px 1px black", top: 5, left: 290 })
        text2 = new VirtualText({ text: "support via DANA", color: "white", fontSize: 9, padding: "2px 8px", top: 5, right: 5 })
        text3 = new VirtualText({ text: "0821-1602-3162", color: "white", fontSize: 9, padding: "2px 8px", top: 18, right: 5 })
        avatar = new VirtualImg({ src: selectedHero === "miya" ? "Avatar1.png" : "ShukenIdle1.png", width: 60, height: 60, top: 5, left: 5, borderRadius: "50%", background: "#eee", border: "2px solid gold" })
        
        game.render(dt => {
          physics.grid.buildDynamic(buff, kelomang, bulletKelomang, guin, peluruGuin, drawItem, bolaPetir, petirArea, petirAtas)
          dialog.play(dt)
          
          const activeHeroObj = selectedHero === "miya" ? hero.miya : hero.shuken
          game.cameraOn({ active: activeHeroObj }, "active", 4, 2.5)
          for (let entitas of listUpdateDraw) { entitas.update(dt, game.camera) }
          
          if (selectedHero === "miya") {
            const miya = hero.miya
            const moveDir = gameController?.getMoveDirection().dx || 0
            
            if (miya.state === "run" && miya.canMove && !miya.superState) {
              lariTimer += dt
              if (lariTimer >= lariSpeed) { lariTimer = 0; lariFrame++; if (lariFrame > 3) lariFrame = 1 }
              miya.img = `lari${lariFrame}`
            } else if (!miya.superState) { miya.img = baseAnimasi[miya.state] || "idle"; lariTimer = 0; lariFrame = 1 }
            
            if (miya.canMove && !miya.superState) {
              miya.vx = moveDir * miya.speed
            } else { miya.vx = 0 }
            
            physics.applyPhysics(dt, miya)
            physics.platformerLogic(dt, miya)
            miya.vy += miya.gravity * dt
            utils.activeHurtBox(miya)
            
            if (miya.superTimer > 0) {
              miya.superTimer -= dt
              if (miya.superTimer <= 0) { miya.superState = false; miya.isAttack = false; miya.canMove = true; miya.state = "idle" }
            }
            
            miya.energi = Math.min(miya.maxEnergi, miya.energi + 1.5 * dt)
            manaBar.setValue(miya.energi)
            hpBar.setValue(miya.hp)
            
            for (let id in listPanahMiya) {
              let panah = listPanahMiya[id]
              panah.x += panah.dir * panah.speed * dt
              panah.y += panah.dirY * panah.speed * dt
              panah.lifeTime -= dt
              if (panah.lifeTime <= 0) delete listPanahMiya[panah.id]
            }
            
            panahMiyaVsMonster(dt, listPanahMiya, physics)
            miyaVsMonster(dt, hero, hpBar, physics)
            panahMiyaVsKelomang(dt, listPanahMiya, physics)
            miyaVsKelomang(dt, hero, hpBar, physics)
            panahMiyaVsGuin(dt, listPanahMiya, physics)
            if (miya.vy > 3000 || miya.hp <= 0) resetGame(miya)
          }
          
          if (selectedHero === "shuken") {
            const shukenHero = hero.shuken
            const moveDir = gameController?.getMoveDirection().dx || 0
            
            if (shukenHero.canMove && !shukenHero.superState) {
              shukenHero.vx = moveDir * shukenHero.speed
            } else { shukenHero.vx = 0 }
            
            physics.applyPhysics(dt, shukenHero)
            physics.platformerLogic(dt, shukenHero)
            shukenHero.vy += shukenHero.gravity * dt
            utils.activeHurtBox(shukenHero)
            
            if (!shukenHero.superState) {
              if (!shukenHero.onGround) shukenHero.state = shukenHero.vy < 0 ? "jump" : "fall"
              else if (Math.abs(shukenHero.vx) > 10) shukenHero.state = "run"
              else shukenHero.state = "idle"
            }
            
            if (shukenHero.state === "run" && shukenHero.canMove && !shukenHero.superState) {
              lariTimerShuken += dt
              if (lariTimerShuken >= lariSpeed) { lariTimerShuken = 0; lariFrameShuken++; if (lariFrameShuken > 3) lariFrameShuken = 1 }
              shukenHero.img = `shukenRun${lariFrameShuken}`
            } else if (!shukenHero.superState) {
              if (shukenHero.state === "jump") shukenHero.img = "shukenJump"
              else if (shukenHero.state === "fall") shukenHero.img = "shukenFall"
              else if (shukenHero.state === "idle") shukenHero.img = "shukenIdle"
            }
            
            if (shukenHero.superTimer > 0) {
              shukenHero.superTimer -= dt
              if (shukenHero.superTimer <= 0) { shukenHero.superState = false; shukenHero.isAttacking = false; shukenHero.isUsingSkill = false; shukenHero.canMove = true; shukenHero.state = "idle" }
            }
            
            shukenHero.energi = Math.min(shukenHero.maxEnergi, shukenHero.energi + 2 * dt)
            manaBar.setValue(shukenHero.energi)
            hpBar.setValue(shukenHero.hp)
            
            updateBolaPetir(dt, physics)
            updatePetirArea(dt, physics)
            updatePetirAtas(dt, physics)
            
            if (shukenHero.isAttacking && shukenHero.superState) {
              const attackX = shukenHero.animationDirection === "right" ? shukenHero.x + shukenHero.width : shukenHero.x - 60
              const attackHitbox = { x: attackX, y: shukenHero.y + shukenHero.height/3, width: 60, height: 70, damage: shukenHero.attackDamage, scene: "1" }
              physics.aabb({ temp: attackHitbox }, "buff", (hit, musuh) => { musuh.hp -= shukenHero.attackDamage; musuh.tintColor = "purple" })
              physics.aabb({ temp: attackHitbox }, "kelomang", (hit, musuh) => { musuh.hp -= shukenHero.attackDamage; musuh.tintColor = "purple" })
              physics.aabb({ temp: attackHitbox }, "guin", (hit, musuh) => { if (musuh.aktif) musuh.hp -= shukenHero.attackDamage; musuh.tintColor = "purple" })
            }
            
            shukenVsMusuh(dt, hero, hpBar, physics)
            if (shukenHero.vy > 3000 || shukenHero.hp <= 0) resetGame(shukenHero)
          }
          
          const currentPlayer = selectedHero === "miya" ? hero.miya : hero.shuken
          for (let id in buff) { logikaMonsterJungler(dt, currentPlayer, buff[id], physics); hpMonster(dt, buff[id], game.camera, renderer) }
          logikaKelomang(dt, currentPlayer, physics)
          updateBulletKelomang(dt, physics)
          Object.values(kelomang).forEach(el => hpKelomang(dt, el, game.camera, renderer))
          Object.values(guin).forEach(el => hpGuin(dt, el, game.camera, renderer))
          anakKelomangVsMiya(dt, hero, hpBar, physics)
          logikaGuinevere(dt, hero, hpBar, physics, utils)
          updatePeluruGuin(dt)
          peluruGuinVsMiya(dt, hero, hpBar, physics)
          miyaMengambilItem(hero, physics)
          miyaMenerimaEfekItem(hpBar, manaBar, hero, dt, utils)
        })
      }
      
      function resetGame(playerObj) {
        Object.values(tembok).forEach(wl => { if (wl.img === "gerbang") wl.scene = "1" })
        Object.values({...kelomang, ...buff, ...guin}).forEach(el => {
          if (el.originalX !== undefined) { el.x = el.originalX; el.y = el.originalY; el.hp = el.originalHp; el.scene = "1" }
          el.isChase = false; el.isDead = false; el.vx = 0
        })
        playerObj.vy = 0; playerObj.x = 0; playerObj.y = 0
        playerObj.hp = playerObj.maxHp; playerObj.energi = playerObj.maxEnergi
        playerObj.superState = false; playerObj.superTimer = 0
        playerObj.canMove = true; playerObj.state = "idle"
        hpBar.setValue(playerObj.hp); manaBar.setValue(playerObj.energi)
      }
      
      async function startGameAfterLoad() {
        const aset = new Aset(gl, listImg)
        loadedTexture = await aset.load()
        loadingDiv.style.display = "none"
        initGame()
      }
      
      (async () => {
        const aset = new Aset(gl, listImg)
        loadedTexture = await aset.load()
        loadingDiv.style.display = "none"
        selectScreen.style.display = "flex"
      })()
    })()
  </script>
</body>
