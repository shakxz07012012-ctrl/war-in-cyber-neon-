<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>ibill vs mosnyer</title>
  <style>
    *{
      margin :0;
    }
    canvas{
      display: block;
      background: #555;
    }

  #loading{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    z-index:9999;
  }
  </style>
</head>
<body>
  <div id="loading">
    Loading...
  </div>
  <canvas id = "canvas"></canvas>
  <script src="AdivaClient.js"></script>
  <script src="AdivaServer.js"></script>
  <script src="./data.js"></script>
  <script src="./item.js"></script>
  <script src="./semut.js"></script>
  <script src="./kura.js"></script>
  <script src="./laba.js"></script>
  <script>
    const GAME_CONFIG = {
        PLAYER_SPEED: 400,
        PLAYER_JUMP_POWER: 700,
        GRAVITY: 2000,
        PLAYER_MAX_HP: 150,
        PLAYER_MAX_ENERGI: 100,
        ARROW_DAMAGE: 10,
        ARROW_SPEED: 500,
        ARROW_LIFETIME: 3,
        LARI_FRAME_SPEED: 0.15,
        ENERGI_RECHARGE_RATE: 1,
        MONSTER_CHASE_DISTANCE: 300,
        MONSTER_ATTACK_DISTANCE: 60,
        KELOMANG_DAMAGE: 0.8,
        KELOMANG_BULLET_DAMAGE: 10,
        GUIN_DAMAGE: 10,
        GUIN_ATTACK_DAMAGE: 1,
        ITEM_HEAL_AMOUNT: 5,
        ITEM_ENERGI_AMOUNT: 5
    };

    const canvas = document.getElementById("canvas")
    const game = new GameLoop(canvas)
    const gl = game.gl
    const renderer = new Renderer(gl, canvas)
    const utils = new Utils()
    
    const physics = new Collision(150)
    physics.gameState.add("1")
    physics.grid.buildStatic(tembok)
    
    const listImg = {
      idle : {path : "Diam1.png"},
      lari1 : {path : "Lari1.png"},
      lari2 : {path : "Lari2.png"},
      lari3 : {path : "Lari3.png"},
      jump : {path : "Lompat1.png"},
      fall : {path : "Turun1.png"},
      wall : {path : "Walll1.png"},
      gerbang : {path : "WallRentak1.png"},
      panah : {path : "Pnh2.png"},
      panahMisil : {path : "Misil1.png"},
      buff : {path : "Semut2.png"},
      kelomang : {path : "Kura3.png"},
      kelomangDiam : {path : "Kura1.png"},
      kelomangNembak : {path : "Kura2.png"},
      guinLari : {path : "LabaLari2.png"},
      guinDiam : {path : "LabaLari1.png"},
      guinLompat : {path : "LabaNembak1.png"},
      guinUlti : {path : "LabaMakan2.png"},
      guinShoot : {path : "LabaNembak2.png"},
      bolaGuin : {path : "BolaUlti2.png"},
      heal : {path : "Heal1.png"},
      energi : {path : "Energi1.png"},
      peluruGanda : {path : "PeluruGanda1.png"},
    }
    
    const hero = {
      miya : {
        x:0,
        y:-800,
        width : 100,
        height : 100,
        hp : 150,
        energi : 100,
        gravity : GAME_CONFIG.GRAVITY,
        jumpPower : GAME_CONFIG.PLAYER_JUMP_POWER,
        useCollider : true,
        colliderBox : {width : 50, height: 100},
        useHurtBox : true,
        hurtBox : {x:0,y:0,width : 50, height: 120},
        vx : 0,
        vy : 0,
        scene :"1",
        jumpBufferTimer: 0,
        jumpBufferMax: 0.2,
        isAttack: false,
        superState: false,
        superTimer: 0,
        statusItem: "",
        durasiItem: 0,
        tintColor: "white",
        state: "idle",
        animationDirection: "right",
        img: "idle"
      }
    }
    
    const hpBar = new VirtualBarDiv({
        value: hero.miya.hp,
        maxValue: hero.miya.hp,
        width: hero.miya.hp,
        height: 15,
        top: 38,
        left: 82,
        fillColor: "lime",
        visualColor: "maroon",
        background: "#222",
        border:"1px solid black",
        lerpSpeed: 5,
    });
        
    const manaBar = new VirtualBarDiv({
        value: 100,
        maxValue: 100,
        width: 100,
        height: 10,
        top: 55,
        left: 82,
        fillColor: "yellow",
        visualColor: "aqua",
        background: "#222",
        border:"1px solid black",
        lerpSpeed: 5,
    });
    hpBar.el.style.display = "none"
    manaBar.el.style.display = "none"
    
    const tombolKiri = new VirtualButton({
      text :"<=",
      bottom : 15,
      left :30,
      onPress :()=> tombolKiri.press = true,
      onRelease :()=> tombolKiri.press = false,
    })
    
    const tombolKanan = new VirtualButton({
      text :"=>",
      bottom : 15,
      left :120,
      onPress :()=> tombolKanan.press = true,
      onRelease :()=> tombolKanan.press = false,
    })
    
    const tombolLompat = new VirtualButton({
      text :"(^)",
      bottom : 100,
      right :100,
      onPress :()=> {
        const miya = hero.miya;
        miya.jumpBufferTimer = miya.jumpBufferMax
      }
    })
    
    const listPanahMiya = {}
    const tombolPanah = new VirtualButton({
      img :"Misil1.png",
      bottom : 100,
      right :20,
      onPress :()=> {
        const miya = hero.miya;
        if(miya.energi<=0)return
        if(miya.isAttack)return
        miya.isAttack = true
        miya.energi -=2
        manaBar.setValue(miya.energi);
        miya.superState = true
        miya.state = "panah"
        
        const id = crypto.randomUUID()
        listPanahMiya[id] = {
          id : id,
          x : miya.x + miya.width/2 - 15,
          y : miya.y + miya.height/3,
          width : miya.statusItem === "peluruGanda" ? 50 : 30,
          height : miya.statusItem === "peluruGanda" ? 50 : 30,
          scene : miya.scene,
          dir : miya.animationDirection === "right" ? 1 : -1,
          dirY : miya.statusItem === "peluruGanda" ? utils.rand(-0.5,0.5) : 0,
          animationDirection : miya.animationDirection,
          speed : GAME_CONFIG.ARROW_SPEED,
          lifeTime : GAME_CONFIG.ARROW_LIFETIME,
          img : "panahMisil"
        }
        miya.superTimer = 0.1
      },
      onRelease :()=> {
        const miya = hero.miya;
        miya.isAttack = false
      }
    })

    let lariFrame = 1;
    let lariTimer = 0;
    const lariSpeed = GAME_CONFIG.LARI_FRAME_SPEED;

    const baseAnimasi = {
      idle : "idle",
      run : "run",
      jump : "jump",
      fall : "fall",
      panah : "panah",
    }
    
    const aset = new Aset(gl, listImg)
    // Hanya masukkan entitas statis ke listDraw
    const listDraw = [hero, tembok, buff, kelomang, guin]
    const listUpdateDraw = []
    
    // Variabel global untuk texture
    let globalTexture = null;
    
    async function init(){
      const loading = document.getElementById("loading")
      globalTexture = await aset.load()
      loading.style.display = "none"
      hpBar.el.style.display = "block"
      manaBar.el.style.display = "block"
      
      listDraw.forEach(entitas => {
        listUpdateDraw.push(new Draw(entitas, globalTexture, renderer, physics.gameState))
      })
      
      const dialog = new VirtualLyrics(canvas)
      .startX(10)
      .startY(100)
      .color("white")
      .fill("ibill .....")
      .fill("kesadaran yg engkau miliki")
      .fill("menjadikan dirimu sebagai puncak")
      .fill("rantai makanan")
      .fill("tetap tenang, dan terus maju")
      
      const text = new VirtualText({
        text:"ibill",
        color :"white",
        fontSize :25,
        padding:"2px 10px",
        textShadow :"2px 1px 1px red",
        top : 5,
        left :70
      })
      const text2 = new VirtualText({
        text:"support development via DANA",
        color :"white",
        fontSize :10,
        padding:"2px 10px",
        textShadow :"2px 1px 1px blue",
        top : 5,
        right :5
      })
      const text3 = new VirtualText({
        text:"0821-1602-3162",
        color :"white",
        fontSize :10,
        padding:"2px 10px",
        textShadow :"2px 1px 1px black",
        top : 20,
        right :5
      })
      
      const avatar = new VirtualImg({
        src: "Avatar1.png",
        width: 70, height: 70,
        top: 5, left: 5,
        borderRadius: "50%",
        background:"#eee",
        border: "1px solid white"
      });
      
      game.render(dt =>{
        try {
          physics.grid.buildDynamic(buff, kelomang, bulletKelomang, guin, peluruGuin, drawItem)
          
          dialog.play(dt)
          game.cameraOn(hero, "miya")
          
          for(let entitas of listUpdateDraw){
            entitas.update(dt, game.camera)
          }
          
          // ========== GAMBAR ENTITAS DINAMIS ==========
          // Gambar panah Miya
          for(let id in listPanahMiya) {
            const drawObj = new Draw(listPanahMiya[id], globalTexture, renderer, physics.gameState);
            drawObj.update(dt, game.camera);
          }
          
          // Gambar bullet kelomang
          for(let id in bulletKelomang) {
            const drawObj = new Draw(bulletKelomang[id], globalTexture, renderer, physics.gameState);
            drawObj.update(dt, game.camera);
          }
          
          // Gambar peluru Guin
          for(let id in peluruGuin) {
            if(peluruGuin[id].scene !== "inactive") {
              const drawObj = new Draw(peluruGuin[id], globalTexture, renderer, physics.gameState);
              drawObj.update(dt, game.camera);
            }
          }
          
          // Gambar item
          for(let id in drawItem) {
            const drawObj = new Draw(drawItem[id], globalTexture, renderer, physics.gameState);
            drawObj.update(dt, game.camera);
          }
          // ========== END GAMBAR ENTITAS DINAMIS ==========
          
          // Animasi lari
          if(hero.miya.state === "run") {
            lariTimer += dt;
            if(lariTimer >= lariSpeed) {
              lariTimer = 0;
              lariFrame++;
              if(lariFrame > 3) lariFrame = 1;
            }
            hero.miya.img = `lari${lariFrame}`;
          } else {
            hero.miya.img = baseAnimasi[hero.miya.state];
            lariTimer = 0;
            lariFrame = 1;
          }
          
          utils.timer(dt,"timeColorMiya", 0.5,()=>{
            hero.miya.tintColor = "white"
          })
          
          // Kontrol player
          if(tombolKanan.press){
            hero.miya.vx = GAME_CONFIG.PLAYER_SPEED
          }else if(tombolKiri.press){
            hero.miya.vx = -GAME_CONFIG.PLAYER_SPEED
          }else hero.miya.vx = 0
          
          physics.applyPhysics(dt, hero.miya)
          physics.platformerLogic(dt, hero.miya)
          
          hero.miya.vy += hero.miya.gravity * dt
          utils.activeHurtBox(hero.miya)
          
          const miya = hero.miya
          if(miya.superTimer > 0){
            miya.superTimer -= dt
            if(miya.superTimer <= 0){
              miya.superState = false
            }
          }
          
          miya.energi = Math.min(GAME_CONFIG.PLAYER_MAX_ENERGI, miya.energi + GAME_CONFIG.ENERGI_RECHARGE_RATE * dt)
          manaBar.setValue(miya.energi)
          
          // Reset game jika mati
          if(miya.vy > 3000 || miya.hp <= 0){
            Object.values(tembok).forEach(wl=>{
              if(wl.img === "gerbang") wl.scene = "1"
            })
            Object.values({...kelomang, ...buff, ...guin}).forEach(el=>{
              el.x = el.originalX
              el.y = el.originalY
              el.hp = el.originalHp
              el.scene = "1"
              el.isChase = false
              el.isDead = false
              el.vx = 0
              if(el.hpVisual) el.hpVisual = el.hp;
            })
            miya.vy = 0
            miya.x = 0
            miya.y = 0
            miya.hp = GAME_CONFIG.PLAYER_MAX_HP
            miya.energi = GAME_CONFIG.PLAYER_MAX_ENERGI
            hpBar.setValue(miya.hp)
            manaBar.setValue(miya.energi)
            
            // Bersihkan entitas dinamis
            for(let id in listPanahMiya) delete listPanahMiya[id];
            for(let id in bulletKelomang) delete bulletKelomang[id];
            for(let id in drawItem) delete drawItem[id];
            for(let id in peluruGuin) {
              if(peluruGuin[id].scene !== "inactive") peluruGuin[id].scene = "inactive";
            }
          }
          
          // Update panah
          for(let id in listPanahMiya){
            let panah = listPanahMiya[id]
            panah.x += panah.dir * panah.speed * dt
            panah.y += panah.dirY * panah.speed * dt
            panah.lifeTime -= dt
            if(panah.lifeTime <= 0) delete listPanahMiya[panah.id]
          }
          
          // Update monster
          for(let id in buff){
            const monster = buff[id]
            if(monster.scene === miya.scene) {
              logikaMonsterJungler(dt, miya, monster, physics)
              hpMonster(dt, monster, game.camera, renderer)
            }
          }
          
          // Collision
          panahMiyaVsMonster(dt, listPanahMiya, physics)
          miyaVsMonster(dt, hero, hpBar, physics)
          logikaKelomang(dt, miya, physics)
          updateBulletKelomang(dt, physics)
          
          // HP bars
          Object.values(kelomang).forEach(el => {
            if(el.scene === miya.scene) hpKelomang(dt, el, game.camera, renderer)
          })
          Object.values(guin).forEach(el => {
            if(el.scene === miya.scene) hpGuin(dt, el, game.camera, renderer)
          })
          
          // Combat
          panahMiyaVsKelomang(dt, listPanahMiya, physics)
          panahMiyaVsGuin(dt, listPanahMiya, physics)
          miyaVsKelomang(dt, hero, hpBar, physics)
          anakKelomangVsMiya(dt, hero, hpBar, physics)
          logikaGuinevere(dt, hero, hpBar, physics, utils)
          updatePeluruGuin(dt)
          peluruGuinVsMiya(dt, hero, hpBar, physics)
          miyaMengambilItem(hero, physics)
          miyaMenerimaEfekItem(hpBar, manaBar, hero, dt, utils)
          
        } catch(error) {
          console.error("Game error:", error);
        }
      })
    }
    init()
  </script>
</body>
</html>
