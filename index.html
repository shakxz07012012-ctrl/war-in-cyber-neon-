    class GameLoop {
      constructor(canvas) {
        this.canvas = canvas;
        this.gl = canvas.getContext('2d');
        this.camera = { x: 0, y: 0 };
        this.lastTime = 0;
        this.resize();
        window.addEventListener('resize', () => this.resize());
      }
      
      resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
      }
      
      render(callback) {
        const loop = (currentTime) => {
          let dt = Math.min(0.033, (currentTime - this.lastTime) / 1000);
          if (dt <= 0) {
            this.lastTime = currentTime;
            requestAnimationFrame(loop);
            return;
          }
          this.lastTime = currentTime;
          
          this.gl.clearRect(0, 0, this.canvas.width, this.canvas.height);
          callback(dt);
          requestAnimationFrame(loop);
        };
        
        this.lastTime = performance.now();
        requestAnimationFrame(loop);
      }
      
      cameraOn(obj, key) {
        const target = obj[key];
        if (target) {
          this.camera.x = target.x + target.width/2 - this.canvas.width/2;
          this.camera.y = target.y + target.height/2 - this.canvas.height/2;
          this.camera.x = Math.max(0, this.camera.x);
          this.camera.y = Math.max(0, this.camera.y);
        }
      }
    }
    
    class Renderer {
      constructor(gl, canvas) {
        this.gl = gl;
        this.canvas = canvas;
        this.images = {};
      }
      
      fillRect(x, y, width, height, color) {
        this.gl.fillStyle = color;
        this.gl.fillRect(x, y, width, height);
      }
      
      drawImage(img, x, y, width, height, tintColor) {
        if (!img) return;
        if (tintColor && tintColor !== "white") {
          this.gl.save();
          this.gl.globalCompositeOperation = 'source-over';
          this.gl.drawImage(img, x, y, width, height);
          this.gl.fillStyle = tintColor;
          this.gl.globalAlpha = 0.5;
          this.gl.fillRect(x, y, width, height);
          this.gl.restore();
        } else {
          this.gl.drawImage(img, x, y, width, height);
        }
      }
    }
    
    class Utils {
      constructor() {
        this.timers = {};
      }
      
      timer(dt, name, duration, callback) {
        if (this.timers[name] === undefined) this.timers[name] = 0;
        this.timers[name] += dt;
        if (this.timers[name] >= duration) {
          this.timers[name] = 0;
          if (callback) callback();
          return true;
        }
        return false;
      }
      
      rand(min, max) {
        return min + Math.random() * (max - min);
      }
      
      activeHurtBox(hero) {
        if (hero.useHurtBox && hero.hurtBox) {
          hero.hurtBox.x = hero.x + (hero.width - hero.hurtBox.width) / 2;
          hero.hurtBox.y = hero.y + hero.height - hero.hurtBox.height;
        }
      }
      
      splitTime(dt, name, pattern, callback) {
        const times = pattern.split(' ').map(Number);
        if (this.timers[name] === undefined) {
          this.timers[name] = 0;
          this.timers[name + '_index'] = 0;
        }
        this.timers[name] += dt;
        const currentIndex = this.timers[name + '_index'];
        if (this.timers[name] >= times[currentIndex]) {
          this.timers[name] = 0;
          this.timers[name + '_index'] = (currentIndex + 1) % times.length;
          if (callback) {
            const result = {};
            result[`timer${currentIndex + 1}`] = true;
            callback(result);
          }
        }
      }
    }
    
    class Collision {
      constructor(gridSize) {
        this.gridSize = gridSize || 150;
        this.gameState = {
          _data: {},
          add: (scene) => { this.gameState._data[scene] = {}; },
          get: (type) => this.gameState._data[type],
          set: (type, data) => { this.gameState._data[type] = data; }
        };
        this.grid = {
          buildStatic: (data) => { this.staticData = data; },
          buildDynamic: (...args) => { this.dynamicData = args; }
        };
      }
      
      aabb(obj1, targetTypes, callback) {
        const targets = targetTypes.split(",");
        for (let type of targets) {
          const trimmedType = type.trim();
          const list = this.gameState.get(trimmedType);
          if (!list) continue;
          
          for (let id in list) {
            const obj2 = list[id];
            if (obj2.scene === "inactive") continue;
            if (obj2.hp !== undefined && obj2.hp <= 0) continue;
            
            const w1 = obj1.width || obj1.colliderBox?.width || 50;
            const h1 = obj1.height || obj1.colliderBox?.height || 50;
            const w2 = obj2.width || obj2.colliderBox?.width || 50;
            const h2 = obj2.height || obj2.colliderBox?.height || 50;
            
            if (obj1.x < obj2.x + w2 && obj1.x + w1 > obj2.x &&
                obj1.y < obj2.y + h2 && obj1.y + h1 > obj2.y) {
              callback(obj1, obj2);
            }
          }
        }
      }
      
      aabbRange(x, y, width, height, targetTypes, callback) {
        const targets = targetTypes.split(",");
        for (let type of targets) {
          const trimmedType = type.trim();
          const list = this.gameState.get(trimmedType);
          if (!list) continue;
          
          for (let id in list) {
            const obj = list[id];
            if (obj.scene === "inactive") continue;
            if (obj.hp !== undefined && obj.hp <= 0) continue;
            
            const objW = obj.width || obj.colliderBox?.width || 50;
            const objH = obj.height || obj.colliderBox?.height || 50;
            
            if (x < obj.x + objW && x + width > obj.x &&
                y < obj.y + objH && y + height > obj.y) {
              callback(obj);
            }
          }
        }
      }
      
      applyPhysics(dt, obj) {
        if (!obj.useCollider) return;
        obj.x += obj.vx * dt;
        obj.y += obj.vy * dt;
        
        if (this.staticData) {
          const w = obj.colliderBox?.width || obj.width || 50;
          const h = obj.colliderBox?.height || obj.height || 50;
          
          for (let id in this.staticData) {
            const wall = this.staticData[id];
            if (wall.scene === "inactive") continue;
            
            if (obj.x < wall.x + wall.width && obj.x + w > wall.x &&
                obj.y < wall.y + wall.height && obj.y + h > wall.y) {
              
              const overlapLeft = (obj.x + w) - wall.x;
              const overlapRight = (wall.x + wall.width) - obj.x;
              const overlapTop = (obj.y + h) - wall.y;
              const overlapBottom = (wall.y + wall.height) - obj.y;
              
              const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
              
              if (minOverlap === overlapLeft || minOverlap === overlapRight) {
                if (overlapLeft < overlapRight) obj.x = wall.x - w;
                else obj.x = wall.x + wall.width;
                obj.vx = 0;
              } else {
                if (overlapTop < overlapBottom) {
                  obj.y = wall.y - h;
                  obj.vy = 0;
                  obj.isGrounded = true;
                } else {
                  obj.y = wall.y + wall.height;
                  obj.vy = 0;
                }
              }
            }
          }
        }
      }
      
      platformerLogic(dt, obj) {
        obj.isGrounded = false;
        if (this.staticData) {
          const w = obj.colliderBox?.width || obj.width || 50;
          const h = obj.colliderBox?.height || obj.height || 50;
          
          for (let id in this.staticData) {
            const wall = this.staticData[id];
            if (wall.scene === "inactive") continue;
            
            if (obj.x < wall.x + wall.width && obj.x + w > wall.x &&
                obj.y + h <= wall.y + 10 && obj.y + h + obj.vy * dt >= wall.y) {
              obj.isGrounded = true;
              obj.vy = 0;
              obj.y = wall.y - h;
            }
          }
        }
      }
    }
    
    class Aset {
      constructor(gl, listImg) {
        this.gl = gl;
        this.listImg = listImg;
        this.images = {};
      }
      
      async load() {
        const promises = [];
        for (let key in this.listImg) {
          const promise = new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              this.images[key] = img;
              resolve();
            };
            img.onerror = () => {
              console.warn(`Gagal load: ${this.listImg[key].path}`);
              this.images[key] = null;
              resolve();
            };
            img.src = this.listImg[key].path;
          });
          promises.push(promise);
        }
        await Promise.all(promises);
        return this.images;
      }
    }
    
    class Draw {
      constructor(data, texture, renderer, gameState) {
        this.data = data;
        this.texture = texture;
        this.renderer = renderer;
        this.gameState = gameState;
      }
      
      update(dt, camera) {
        for (let key in this.data) {
          const obj = this.data[key];
          if (obj.scene === "inactive") continue;
          
          const img = this.texture[obj.img];
          if (img) {
            this.renderer.drawImage(
              img, 
              obj.x - camera.x, 
              obj.y - camera.y, 
              obj.width, 
              obj.height,
              obj.tintColor
            );
          } else {
            this.renderer.fillRect(obj.x - camera.x, obj.y - camera.y, obj.width, obj.height, obj.color || "gray");
          }
        }
      }
    }

        this.el.style.cursor = 'pointer';
        this.el.style.zIndex = '1000';
        
        if (this.text) this.el.innerText = this.text;
        if (this.img) {
          const imgEl = document.createElement('img');
          imgEl.src = this.img;
          imgEl.style.width = '80%';
          imgEl.style.height = '80%';
          this.el.appendChild(imgEl);
        }
        
        this.el.addEventListener('touchstart', (e) => {
          e.preventDefault();
          this.press = true;
          this.onPress();
        });
        this.el.addEventListener('touchend', (e) => {
          e.preventDefault();
          this.press = false;
          this.onRelease();
        });
        this.el.addEventListener('mousedown', () => {
          this.press = true;
          this.onPress();
        });
        this.el.addEventListener('mouseup', () => {
          this.press = false;
          this.onRelease();
        });
        
        document.body.appendChild(this.el);
      }
    }
    
    class VirtualBarDiv {
      constructor(options) {
        this.value = options.value;
        this.maxValue = options.maxValue;
        this.width = options.width;
        this.height = options.height;
        this.top = options.top;
        this.left = options.left;
        this.fillColor = options.fillColor;
        this.visualColor = options.visualColor;
        this.background = options.background;
        this.border = options.border;
        this.lerpSpeed = options.lerpSpeed || 5;
        this.visualValue = options.value;
        
        this.el = document.createElement('div');
        this.el.style.position = 'fixed';
        this.el.style.top = this.top + 'px';
        this.el.style.left = this.left + 'px';
        this.el.style.width = this.width + 'px';
        this.el.style.height = this.height + 'px';
        this.el.style.backgroundColor = this.background;
        this.el.style.border = this.border;
        this.el.style.overflow = 'hidden';
        
        this.fillEl = document.createElement('div');
        this.fillEl.style.height = '100%';
        this.fillEl.style.width = (this.value / this.maxValue) * 100 + '%';
        this.fillEl.style.backgroundColor = this.fillColor;
        this.fillEl.style.transition = `width ${this.lerpSpeed * 0.1}s linear`;
        
        this.visualEl = document.createElement('div');
        this.visualEl.style.height = '100%';
        this.visualEl.style.width = (this.value / this.maxValue) * 100 + '%';
        this.visualEl.style.backgroundColor = this.visualColor;
        this.visualEl.style.position = 'absolute';
        this.visualEl.style.top = '0';
        this.visualEl.style.left = '0';
        
        this.el.appendChild(this.visualEl);
        this.el.appendChild(this.fillEl);
        document.body.appendChild(this.el);
      }
      
      setValue(value) {
        this.value = Math.min(this.maxValue, Math.max(0, value));
        const percent = (this.value / this.maxValue) * 100;
        this.fillEl.style.width = percent + '%';
      }
      
      setVisualValue(value) {
        this.visualValue = Math.min(this.maxValue, Math.max(0, value));
        const percent = (this.visualValue / this.maxValue) * 100;
        this.visualEl.style.width = percent + '%';
      }
    }

    class VirtualLyrics {
      constructor(canvas) {
        this.canvas = canvas;
        this.lines = [];
        this.currentIndex = 0;
        this.timer = 0;
        this.delay = 3;
        this.active = false;
        this.x = 10;
        this.y = 100;
        this.color = "white";
        this.el = null;
      }
      
      startX(x) { this.x = x; return this; }
      startY(y) { this.y = y; return this; }
      color(c) { this.color = c; return this; }
      fill(text) { this.lines.push(text); return this; }
      
      play(dt) {
        if (!this.active && this.lines.length > 0) {
          this.active = true;
          this.showCurrentLine();
        }
        if (this.active) {
          this.timer += dt;
          if (this.timer >= this.delay) {
            this.timer = 0;
            this.currentIndex++;
            if (this.currentIndex >= this.lines.length) {
              this.active = false;
              if (this.el) this.el.remove();
            } else {
              this.showCurrentLine();
            }
          }
        }
      }
      
      showCurrentLine() {
        if (this.el) this.el.remove();
        this.el = document.createElement('div');
        this.el.innerText = this.lines[this.currentIndex];
        this.el.style.position = 'fixed';
        this.el.style.left = this.x + 'px';
        this.el.style.top = this.y + 'px';
        this.el.style.color = this.color;
        this.el.style.backgroundColor = 'rgba(0,0,0,0.7)';
        this.el.style.padding = '10px 20px';
        this.el.style.borderRadius = '10px';
        this.el.style.fontFamily = 'monospace';
        this.el.style.fontSize = '14px';
        this.el.style.maxWidth = '80%';
        this.el.style.zIndex = '1000';
        document.body.appendChild(this.el);
      }
    }

        hurtBox: { x: 0, y: 0, width: 50, height: 120 }, vx: 0, vy: 0,
        scene: "1", state: "idle", img: "idle", animationDirection: "right",
        statusItem: "", durasiItem: 0, isAttack: false, superState: false, superTimer: 0,
        jumpBufferTimer: 0, jumpBufferMax: 0.15, tintColor: "white",
        cd_pukul: 0, cd_uppercut: 0, cd_rush: 0, cd_hadouken: 0, cd_shoryuken: 0,
        currentSkill: "", skillTimer: 0, invincible: false
      }
    };
    
    const drawItem = {};
    const item = {
      heal: { width: 40, height: 40, img: "heal", lifeTime: 10, duration: 4, scene: "1", type: "item" },
      energi: { width: 40, height: 40, img: "energi", lifeTime: 10, duration: 5, scene: "1", type: "item" },
      peluruGanda: { width: 40, height: 40, img: "peluruGanda", lifeTime: 10, duration: 4, scene: "1", type: "item" },
    };
    
    const listItemDrop = [
      { nama: "heal", peluang: 0.3 },
      { nama: "energi", peluang: 0.3 },
      { nama: "peluruGanda", peluang: 0.4 },
    ];
    
    function getItem() {
      let step = 0;
      let rand = Math.random();
      for (let itm of listItemDrop) {
        step += itm.peluang;
        if (rand < step) return itm.nama;
      }
      return null;
    }
    
    const listPanahMiya = {};
    const bulletKelomang = {};
    const peluruGuin = {};
    
    const listImg = {
      idle: { path: "Diam1.png" }, lari1: { path: "Lari1.png" }, lari2: { path: "Lari2.png" }, lari3: { path: "Lari3.png" },
      jump: { path: "Lompat1.png" }, fall: { path: "Turun1.png" }, wall: { path: "Walll1.png" }, gerbang: { path: "WallRentak1.png" },
      panah: { path: "Pnh2.png" }, panahMisil: { path: "Misil1.png" }, buff: { path: "Semut2.png" },
      kelomang: { path: "Kura3.png" }, kelomangDiam: { path: "Kura1.png" }, kelomangNembak: { path: "Kura2.png" },
      guinLari: { path: "LabaLari2.png" }, guinDiam: { path: "LabaLari1.png" }, guinLompat: { path: "LabaNembak1.png" },
      guinUlti: { path: "LabaMakan2.png" }, guinShoot: { path: "LabaNembak2.png" }, bolaGuin: { path: "BolaUlti2.png" },
      heal: { path: "Heal1.png" }, energi: { path: "Energi1.png" }, peluruGanda: { path: "PeluruGanda1.png" },
      shukenIdle: { path: "ShukenIdle.png" }, shukenPukul: { path: "ShukenPukul.png" }, shukenUppercut: { path: "ShukenUppercut.png" },
      shukenRush: { path: "ShukenRush.png" }, shukenHadouken: { path: "ShukenHadouken.png" }, shukenUlti: { path: "ShukenUlti.png" },
      projectileHadouken: { path: "Hadouken.png" }
    };
    
    // ==================== SHU KEN DATA & FUNCTIONS ====================
    
    const shukenEnemy = {
      "shuken-1": {
        id: "shuken-1", x: 6800, y: 0, originalX: 6800, originalY: 0,
        width: 80, height: 80, type: "shuken", scene: "1", originalScene: "1",
        hp: 300, originalHp: 300, img: "shukenIdle", gravity: 2000, vx: 0, vy: 0,
        useCollider: true, colliderBox: { width: 50, height: 70 }, isDead: false,
        animationDirection: "right"
      }
    };
    
    const listProjectileShuken = {};
    
    function updateShukenCooldowns(hero, dt) {
      const cds = ["cd_pukul", "cd_uppercut", "cd_rush", "cd_hadouken", "cd_shoryuken"];
      cds.forEach(s => { if (hero[s] > 0) hero[s] = Math.max(0, hero[s] - dt); });
      if (hero.skillTimer > 0) {
        hero.skillTimer -= dt;
        if (hero.skillTimer <= 0 && hero.currentSkill) {
          hero.currentSkill = "";
          hero.invincible = false;
        }
      }
    }
    
    function updateHadoukenProjectile(dt, physics) {
      for (let id in listProjectileShuken) {
        const p = listProjectileShuken[id];
        p.x += p.dir * p.speed * dt;
        p.lifeTime -= dt;
        if (p.lifeTime <= 0) { delete listProjectileShuken[id]; continue; }
        physics.aabb(p, "kelomang,buff,guin,shuken", (proj, enemy) => {
          enemy.hp -= p.damage;
          enemy.tintColor = "red";
          delete listProjectileShuken[proj.id];
        });
      }
    }
    
    function logikaShuKen(dt, miya, physics) {
      Object.values(shukenEnemy).forEach(el => {
        if (el.hp <= 0) {
          el.scene = "inactive";
          Object.values(tembok).forEach(w => { if (w.img === "gerbang") w.scene = "inactive"; });
          return;
        }
        el.vx = el.vx || 0; el.vy = el.vy || 0;
        physics.applyPhysics(dt, el);
        el.vy += 2000 * dt;
        const dx = miya.x - el.x;
        if (Math.abs(dx) > 60) el.vx = dx > 0 ? 120 : -120;
        else el.vx = 0;
        el.img = "shukenIdle";
      });
    }
    
    function panahMiyaVsShuKen(panah, physics) {
      physics.aabb(panah, "shuken", (p, enemy) => {
        if (enemy.hp <= 0) return;
        enemy.hp -= 8;
        enemy.tintColor = "red";
        delete panah[p.id];
      });
    }
    
    function miyaVsShuKen(hero, hpBar, physics) {
      physics.aabb(hero, "shuken", (h, enemy) => {
        if (h.invincible) return;
        h.hp -= 5;
        hpBar.setValue(h.hp);
        h.tintColor = "red";
      });
    }
    
    function hpShuKen(dt, monster, camera, renderer) {
      if (monster.hp <= 0 || monster.scene === "inactive") return;
      monster.hpVisual = monster.hpVisual || monster.hp;
      monster.hpVisual -= (monster.hpVisual - monster.hp) * 5 * dt;
      const bw = 80, bx = monster.x - camera.x, by = monster.y - camera.y - 15;
      renderer.fillRect(bx, by, bw, 10, "#330000");
      renderer.fillRect(bx, by, (monster.hpVisual / monster.originalHp) * bw, 10, "#ff6600");
      renderer.fillRect(bx, by, (monster.hp / monster.originalHp) * bw, 10, "#ff0000");
    }
    
    // ==================== LOGIKA MUSUH ====================
    
    function logikaBuff(dt, miya, monster, physics) {
      monster.vx = monster.vx || 0; monster.vy = monster.vy || 0;
      physics.applyPhysics(dt, monster);
      monster.vy += 2000 * dt;
      if (Math.abs(miya.x - monster.x) < 300) monster.isChase = true;
      if (monster.hp <= 0) monster.scene = "inactive";
      if (monster.isChase && Math.abs(miya.x - monster.x) > 60) {
        monster.vx += (miya.x - monster.x) > 0 ? 1 : -1;
      }
    }
    
    function hpBarGeneric(dt, monster, camera, renderer) {
      if (monster.hp <= 0 || monster.scene === "inactive") return;
      monster.hpVisual = monster.hpVisual || monster.hp;
      monster.hpVisual -= (monster.hpVisual - monster.hp) * 5 * dt;
      renderer.fillRect(monster.x - camera.x, monster.y - camera.y, monster.hpVisual, 8, "maroon");
      renderer.fillRect(monster.x - camera.x, monster.y - camera.y, monster.hp, 8, "red");
    }
    
    function panahVsMonster(panah, physics) {
      physics.aabb(panah, "buff", (p, m) => { m.hp -= 10; m.tintColor = "red"; delete panah[p.id]; });
      physics.aabb(panah, "kelomang", (p, m) => { m.hp -= 10; m.tintColor = "red"; delete panah[p.id]; });
      physics.aabb(panah, "guin", (p, m) => { if(m.aktif) { m.hp -= 5; m.tintColor = "red"; } delete panah[p.id]; });
    }
    
    function miyaVsMonster(hero, hpBar, physics) {
      physics.aabb(hero, "buff", (h, m) => { h.hp -= 0.8; hpBar.setValue(h.hp); });
      physics.aabb(hero, "kelomang", (h, m) => { h.hp -= 0.8; hpBar.setValue(h.hp); });
      physics.aabb(hero, "guin", (h, m) => { if(m.aktif) { h.hp -= 5; hpBar.setValue(h.hp); } });
    }
    
    function logikaKelomang(dt, miya, physics) {
      Object.values(kelomang).forEach(el => {
        if (el.hp <= 0) {
          el.scene = "inactive";
          const drop = getItem();
          if (drop && !el.isDead) {
            el.isDead = true;
            const id = crypto.randomUUID();
            drawItem[id] = { ...item[drop], x: el.x + el.width/2, y: el.y + el.height/2, id: id };
          }
          return;
        }
        el.vx = el.vx || 0; el.vy = el.vy || 0;
        physics.applyPhysics(dt, el);
        el.vy += 2000 * dt;
        const dx = miya.x - el.x;
        if (Math.abs(dx) < 300) {
          el.vx = dx > 0 ? 100 : -100;
          el.img = "kelomang";
        } else {
          el.vx = 0;
          el.img = "kelomangDiam";
        }
      });
    }
    
    function logikaGuin(dt, miya, physics) {
      Object.values(guin).forEach(el => {
        if (Math.abs(miya.x - el.x) < 500) el.aktif = true;
        if (!el.aktif) return;
        if (el.hp <= 0) { el.scene = "inactive"; return; }
        el.vx = el.vx || 0; el.vy = el.vy || 0;
        physics.applyPhysics(dt, el);
        el.vy += 2000 * dt;
        const dx = miya.x - el.x;
        if (Math.abs(dx) > 60) el.vx = dx > 0 ? 150 : -150;
        else el.vx = 0;
        el.img = "guinLari";
      });
    }
    
    function miyaMengambilItem(hero, physics) {
      physics.aabb(hero, "item", (h, itm) => {
        h.statusItem = itm.img;
        h.durasiItem = itm.duration;
        delete drawItem[itm.id];
      });
    }
    
    function miyaMenerimaEfekItem(hpBar, manaBar, hero, dt) {
      const m = hero.miya;
      switch(m.statusItem) {
        case "heal": m.hp = Math.min(150, m.hp + 5*dt); hpBar.setValue(m.hp); m.durasiItem -= dt; if(m.durasiItem<=0) m.statusItem=""; break;
        case "energi": m.energi = Math.min(100, m.energi + 5*dt); manaBar.setValue(m.energi); m.durasiItem -= dt; if(m.durasiItem<=0) m.statusItem=""; break;
        case "peluruGanda": m.durasiItem -= dt; if(m.durasiItem<=0) m.statusItem=""; break;
      }
    }
    
    // ==================== INISIALISASI ====================
    const canvasEl = document.getElementById("canvas");
    const gameLoop = new GameLoop(canvasEl);
    const render = new Renderer(gameLoop.gl, canvasEl);
    const utilsGame = new Utils();
    const physicsGame = new Collision(150);
    
    physicsGame.gameState.add("1");
    physicsGame.grid.buildStatic(tembok);
    
    const hpBarUI = new VirtualBarDiv({
      value: hero.miya.hp, maxValue: hero.miya.hp, width: hero.miya.hp, height: 15,
      top: 38, left: 82, fillColor: "lime", visualColor: "maroon", background: "#222", border: "1px solid black", lerpSpeed: 5
    });
    
    const manaBarUI = new VirtualBarDiv({
      value: 100, maxValue: 100, width: 100, height: 10,
      top: 55, left: 82, fillColor: "yellow", visualColor: "aqua", background: "#222", border: "1px solid black", lerpSpeed: 5
    });
    
    hpBarUI.el.style.display = "none";
    manaBarUI.el.style.display = "none";
    
    // Tombol gerak
    const btnKiri = new VirtualButton({ text: "<=", bottom: 15, left: 30, width: 70, height: 60, fontSize: 28, onPress: () => btnKiri.press = true, onRelease: () => btnKiri.press = false });
    const btnKanan = new VirtualButton({ text: "=>", bottom: 15, left: 120, width: 70, height: 60, fontSize: 28, onPress: () => btnKanan.press = true, onRelease: () => btnKanan.press = false });
    const btnLompat = new VirtualButton({ text: "^", bottom: 100, right: 100, width: 60, height: 60, fontSize: 32, onPress: () => hero.miya.jumpBufferTimer = hero.miya.jumpBufferMax });
    const btnPanah = new VirtualButton({
      img: "Misil1.png", bottom: 100, right: 20, width: 60, height: 60,
      onPress: () => {
        const m = hero.miya;
        if (m.energi <= 0 || m.isAttack) return;
        m.isAttack = true;
        m.energi -= 2;
        manaBarUI.setValue(m.energi);
        m.superState = true;
        m.state = "panah";
        const id = crypto.randomUUID();
        listPanahMiya[id] = {
          id, x: m.x + m.width/2 - 15, y: m.y + m.height/3,
          width: m.statusItem === "peluruGanda" ? 50 : 30, height: m.statusItem === "peluruGanda" ? 50 : 30,
          scene: m.scene, dir: m.animationDirection === "right" ? 1 : -1,
          dirY: m.statusItem === "peluruGanda" ? utilsGame.rand(-0.5,0.5) : 0,
          speed: 500, lifeTime: 3, img: "panahMisil"
        };
        m.superTimer = 0.1;
      },
      onRelease: () => hero.miya.isAttack = false
    });
    
    // Tombol skill Shu Ken
    const btnPukul = new VirtualButton({
      text: "👊", bottom: 15, right: 320, width: 55, height: 55, fontSize: 28,
      background: "rgba(0,0,0,0.7)", borderRadius: "50%", border: "2px solid orange",
      onPress: () => {
        const m = hero.miya;
        if (m.cd_pukul > 0) return;
        m.cd_pukul = 0.5;
        m.currentSkill = "pukul";
        m.skillTimer = 0.2;
        m.tintColor = "orange";
        const xPos = m.x + (m.animationDirection === "right" ? 60 : -60);
        physicsGame.aabbRange(xPos, m.y, 60, 80, "kelomang,buff,guin,shuken", (e) => { e.hp -= 15; e.tintColor = "red"; });
        setTimeout(() => { if (m.currentSkill === "pukul") m.tintColor = "white"; }, 200);
      }
    });
    
    const btnUppercut = new VirtualButton({
      text: "⬆️", bottom: 80, right: 320, width: 55, height: 55, fontSize: 28,
      background: "rgba(0,0,0,0.7)", borderRadius: "50%", border: "2px solid yellow",
      onPress: () => {
        const m = hero.miya;
        if (m.cd_uppercut > 0) return;
        m.cd_uppercut = 2;
        m.currentSkill = "uppercut";
        m.skillTimer = 0.3;
        m.vy = -400;
        m.tintColor = "yellow";
        physicsGame.aabbRange(m.x, m.y, 70, 100, "kelomang,buff,guin,shuken", (e) => { e.hp -= 25; e.vy = -300; e.tintColor = "red"; });
        setTimeout(() => { if (m.currentSkill === "uppercut") m.tintColor = "white"; }, 300);
      }
    });
    
    const btnRush = new VirtualButton({
      text: "💨", bottom: 145, right: 320, width: 55, height: 55, fontSize: 28,
      background: "rgba(0,0,0,0.7)", borderRadius: "50%", border: "2px solid cyan",
      onPress: () => {
        const m = hero.miya;
        if (m.cd_rush > 0) return;
        m.cd_rush = 3;
        m.currentSkill = "rush";
        m.skillTimer = 0.4;
        m.invincible = true;
        m.tintColor = "cyan";
        m.vx = m.animationDirection === "right" ? 600 : -600;
        let hit = 0;
        const iv = setInterval(() => {
          if (m.skillTimer <= 0 || hit >= 3) { clearInterval(iv); m.invincible = false; if (m.currentSkill === "rush") m.tintColor = "white"; return; }
          physicsGame.aabbRange(m.x, m.y, 80, 80, "kelomang,buff,guin,shuken", (e) => { e.hp -= 10; e.tintColor = "red"; });
          hit++;
        }, 130);
      }
    });
    
    const btnHadouken = new VirtualButton({
      text: "🌊", bottom: 15, right: 250, width: 55, height: 55, fontSize: 28,
      background: "rgba(0,0,0,0.7)", borderRadius: "50%", border: "2px solid blue",
      onPress: () => {
        const m = hero.miya;
        if (m.cd_hadouken > 0) return;
        if (m.energi < 15) return;
        m.cd_hadouken = 1.5;
        m.energi -= 15;
        manaBarUI.setValue(m.energi);
        m.currentSkill = "hadouken";
        m.skillTimer = 0.3;
        m.tintColor = "blue";
        const id = crypto.randomUUID();
        listProjectileShuken[id] = {
          id, x: m.x + m.width/2, y: m.y + m.height/3, width: 40, height: 40,
          scene: m.scene, dir: m.animationDirection === "right" ? 1 : -1,
          speed: 550, damage: 20, lifeTime: 2.5, img: "projectileHadouken"
        };
        setTimeout(() => { if (m.currentSkill === "hadouken") m.tintColor = "white"; }, 300);
      }
    });
    
    const btnShoryuken = new VirtualButton({
      text: "🔥", bottom: 80, right: 250, width: 55, height: 55, fontSize: 28,
      background: "rgba(0,0,0,0.7)", borderRadius: "50%", border: "2px solid red",
      onPress: () => {
        const m = hero.miya;
        if (m.cd_shoryuken > 0) return;
        if (m.energi < 30) return;
        m.cd_shoryuken = 8;
        m.energi -= 30;
        manaBarUI.setValue(m.energi);
        m.currentSkill = "shoryuken";
        m.skillTimer = 0.5;
        m.vy = -500;
        m.invincible = true;
        m.tintColor = "red";
        setTimeout(() => {
          if (m.skillTimer > 0) physicsGame.aabbRange(m.x, m.y - 100, 120, 120, "kelomang,buff,guin,shuken", (e) => { e.hp -= 45; e.vy = -400; e.tintColor = "red"; });
        }, 200);
        setTimeout(() => { if (m.currentSkill === "shoryuken") { m.tintColor = "white"; m.invincible = false; } }, 500);
      }
    });
    
    // Animasi
    let lariFrame = 1, lariTimer = 0;
    const baseAnim = { idle: "idle", run: "run", jump: "jump", fall: "fall", panah: "panah" };
    
    // Asset load & game start
    const asetGame = new Aset(gameLoop.gl, listImg);
    const listDraw = [hero, tembok, listPanahMiya, buff, kelomang, bulletKelomang, guin, peluruGuin, drawItem, listProjectileShuken, shukenEnemy];
    const drawList = [];
    
    async function startGame() {
      const loadingDiv = document.getElementById("loading");
      await asetGame.load();
      loadingDiv.style.display = "none";
      hpBarUI.el.style.display = "block";
      manaBarUI.el.style.display = "block";
      
      listDraw.forEach(data => { drawList.push(new Draw(data, asetGame.images, render, physicsGame.gameState)); });
      
      gameLoop.render(dt => {
        physicsGame.grid.buildDynamic(buff, kelomang, bulletKelomang, guin, peluruGuin, drawItem, shukenEnemy);
        gameLoop.cameraOn(hero, "miya");
        drawList.forEach(d => d.update(dt, gameLoop.camera));
        
        const m = hero.miya;
        
        // Animasi lari
        if (m.state === "run") {
          lariTimer += dt;
          if (lariTimer >= 0.15) { lariTimer = 0; lariFrame = (lariFrame % 3) + 1; }
          m.img = `lari${lariFrame}`;
        } else { m.img = baseAnim[m.state] || "idle"; lariTimer = 0; lariFrame = 1; }
        
        // Gerakan
        m.vx = btnKanan.press ? 400 : (btnKiri.press ? -400 : 0);
        if (m.jumpBufferTimer > 0 && m.isGrounded) { m.vy = -m.jumpPower; m.jumpBufferTimer = 0; }
        m.jumpBufferTimer -= dt;
        
        physicsGame.applyPhysics(dt, m);
        physicsGame.platformerLogic(dt, m);
        m.vy += m.gravity * dt;
        utilsGame.activeHurtBox(m);
        
        if (m.superTimer > 0) { m.superTimer -= dt; if (m.superTimer <= 0) m.superState = false; }
        m.energi = Math.min(100, m.energi + 1 * dt);
        manaBarUI.setValue(m.energi);
        
        // Reset if dead
        if (m.vy > 3000 || m.hp <= 0) {
          Object.values(tembok).forEach(w => { if (w.img === "gerbang") w.scene = "1"; });
          [...Object.values(buff), ...Object.values(kelomang), ...Object.values(guin), ...Object.values(shukenEnemy)].forEach(e => {
            e.x = e.originalX; e.y = e.originalY; e.hp = e.originalHp; e.scene = "1"; e.isChase = false; e.isDead = false; e.vx = 0; e.aktif = false;
          });
          m.vy = 0; m.x = 0; m.y = 0; m.hp = 150; m.energi = 100;
          hpBarUI.setValue(m.hp); manaBarUI.setValue(m.energi);
        }
        
        // Update panah
        for (let id in listPanahMiya) {
          let p = listPanahMiya[id];
          p.x += p.dir * p.speed * dt;
          p.y += (p.dirY || 0) * p.speed * dt;
          p.lifeTime -= dt;
          if (p.lifeTime <= 0) delete listPanahMiya[id];
        }
        
        // Update semua logika
        Object.values(buff).forEach(b => logikaBuff(dt, m, b, physicsGame));
        logikaKelomang(dt, m, physicsGame);
        logikaGuin(dt, m, physicsGame);
        logikaShuKen(dt, m, physicsGame);
        
        panahVsMonster(listPanahMiya, physicsGame);
        miyaVsMonster(hero, hpBarUI, physicsGame);
        panahMiyaVsShuKen(listPanahMiya, physicsGame);
        miyaVsShuKen(hero, hpBarUI, physicsGame);
        
        updateHadoukenProjectile(dt, physicsGame);
        updateShukenCooldowns(m, dt);
        
        miyaMengambilItem(hero, physicsGame);
        miyaMenerimaEfekItem(hpBarUI, manaBarUI, hero, dt);
        
        // Health bars
        Object.values(buff).forEach(b => hpBarGeneric(dt, b, gameLoop.camera, render));
        Object.values(kelomang).forEach(k => hpBarGeneric(dt, k, gameLoop.camera, render));
        Object.values(guin).forEach(g => hpBarGeneric(dt, g, gameLoop.camera, render));
        Object.values(shukenEnemy).forEach(s => hpShuKen(dt, s, gameLoop.camera, render));
        
        utilsGame.timer(dt, "colorReset", 0.5, () => { m.tintColor = "white"; });
      });
    }
    
    startGame();
  </script>
</body>
</html>
