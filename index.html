<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ibill vs mosnyer - HP Version</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0a0a2a;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1a2a4a 0%, #2a1a3a 100%);
    }
    
    /* Loading */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a2a;
      color: #aa88ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-family: monospace;
      z-index: 9999;
      flex-direction: column;
      gap: 15px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #aa88ff;
      border-top-color: #ffcc00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Layar Pilih Karakter */
    #selectScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a2a, #1a0a3a);
      z-index: 10000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: monospace;
    }
    #selectScreen h1 {
      color: #ffcc00;
      font-size: 36px;
      margin-bottom: 40px;
    }
    .char-card {
      width: 250px;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      text-align: center;
      margin: 10px;
      cursor: pointer;
      border: 2px solid #666;
    }
    .char-card.selected {
      border-color: #00ff00;
      box-shadow: 0 0 20px #00ff00;
    }
    .char-name {
      font-size: 32px;
      font-weight: bold;
    }
    .char-name.miya { color: #00ff88; }
    .char-name.shuken { color: #aa44ff; }
    .char-stats {
      font-size: 12px;
      color: #ccc;
      margin-top: 10px;
    }
    .btn-start {
      margin-top: 30px;
      padding: 12px 40px;
      font-size: 22px;
      background: linear-gradient(135deg, #ff6600, #ffcc00);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-start.disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    
    /* Tombol Touch */
    .analog-area {
      position: fixed;
      bottom: 30px;
      left: 30px;
      width: 130px;
      height: 130px;
      border-radius: 65px;
      background: rgba(0,0,0,0.4);
      border: 2px solid rgba(255,255,255,0.3);
      z-index: 100;
    }
    .analog-stick {
      position: absolute;
      width: 55px;
      height: 55px;
      border-radius: 27px;
      background: rgba(255,255,255,0.8);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
    }
    .btn-area {
      position: fixed;
      bottom: 30px;
      right: 20px;
      display: flex;
      gap: 15px;
      z-index: 100;
    }
    .touch-btn {
      width: 70px;
      height: 70px;
      border-radius: 35px;
      background: rgba(50,50,100,0.8);
      border: 2px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.05s;
    }
    .touch-btn:active { transform: scale(0.92); }
    .btn-jump { background: rgba(0,150,100,0.8); }
    .btn-attack { background: rgba(200,100,50,0.8); }
    
    /* HP Bar */
    .hpbar {
      position: fixed;
      top: 15px;
      left: 15px;
      right: 15px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      padding: 8px 12px;
      z-index: 100;
    }
    .hp-fill {
      height: 18px;
      background: linear-gradient(90deg, #ff4444, #ff8888);
      border-radius: 9px;
      width: 100%;
      transition: width 0.2s;
    }
    .mp-fill {
      height: 10px;
      background: linear-gradient(90deg, #44ff44, #aaffaa);
      border-radius: 5px;
      width: 100%;
      margin-top: 5px;
      transition: width 0.2s;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div>⚡ LOADING...</div>
  </div>
  
  <div id="selectScreen">
    <h1>⚔️ PILIH KARAKTER ⚔️</h1>
    <div class="char-card" id="cardMiya">
      <div class="char-name miya">MIYA</div>
      <div class="char-stats">❤️150 💛100 🏃400 🏹10<br>Panah Jarak Jauh</div>
    </div>
    <div class="char-card" id="cardShuken">
      <div class="char-name shuken">SHUKEN</div>
      <div class="char-stats">❤️120 💛100 🏃550 👊35<br>3 Skill Petir</div>
    </div>
    <button class="btn-start disabled" id="btnStart">▶ START</button>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <!-- Touch Controls -->
  <div class="analog-area" id="analogArea">
    <div class="analog-stick" id="analogStick"></div>
  </div>
  <div class="btn-area">
    <div class="touch-btn btn-attack" id="btnAttack">👊</div>
    <div class="touch-btn btn-jump" id="btnJump">⬆️</div>
  </div>
  <div class="hpbar" id="hpbar" style="display:none">
    <div class="hp-fill" id="hpFill"></div>
    <div class="mp-fill" id="mpFill"></div>
  </div>
  
  <script>
    // ========== SETUP CANVAS ==========
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    
    // ========== VARIABEL ==========
    let selectedHero = null;
    let moveX = 0;
    let isJumping = false;
    let canJump = true;
    let lastTime = 0;
    
    // Ground
    const groundY = canvas.height - 100;
    
    // Player
    let player = {
      x: canvas.width/2 - 50,
      y: groundY - 100,
      width: 100,
      height: 100,
      vx: 0,
      vy: 0,
      hp: 150,
      maxHp: 150,
      mp: 100,
      maxMp: 100,
      speed: 400,
      gravity: 2000,
      jumpPower: 650,
      onGround: false,
      canMove: true,
      canAttack: true,
      isAttacking: false,
      attackTimer: 0,
      img: null
    };
    
    // Load gambar
    let miyaImg = null;
    let shukenImg = null;
    let loading = true;
    
    function loadImages() {
      miyaImg = new Image();
      shukenImg = new Image();
      miyaImg.src = "Avatar1.png";
      shukenImg.src = "ShukenIdle1.png";
      
      Promise.all([
        new Promise(resolve => { miyaImg.onload = resolve; miyaImg.onerror = () => { console.log("Avatar1.png not found, using fallback"); resolve(); }; }),
        new Promise(resolve => { shukenImg.onload = resolve; shukenImg.onerror = () => { console.log("ShukenIdle1.png not found, using fallback"); resolve(); }; })
      ]).then(() => {
        loading = false;
        document.getElementById("loading").style.display = "none";
        document.getElementById("selectScreen").style.display = "flex";
      });
    }
    
    // ========== ANALOG STICK ==========
    const analogArea = document.getElementById("analogArea");
    const analogStick = document.getElementById("analogStick");
    let stickActive = false;
    let stickX = 0, stickY = 0;
    const maxDist = 40;
    
    function getStickPos(e) {
      const rect = analogArea.getBoundingClientRect();
      const centerX = rect.left + rect.width/2;
      const centerY = rect.top + rect.height/2;
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      let dx = clientX - centerX;
      let dy = clientY - centerY;
      const dist = Math.hypot(dx, dy);
      if (dist > maxDist) {
        dx = dx / dist * maxDist;
        dy = dy / dist * maxDist;
      }
      return { dx, dy };
    }
    
    function updateStick(dx, dy) {
      analogStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      moveX = (dx / maxDist) * player.speed;
    }
    
    function onStart(e) {
      e.preventDefault();
      stickActive = true;
      const { dx, dy } = getStickPos(e);
      updateStick(dx, dy);
    }
    
    function onMove(e) {
      if (!stickActive) return;
      e.preventDefault();
      const { dx, dy } = getStickPos(e);
      updateStick(dx, dy);
    }
    
    function onEnd(e) {
      stickActive = false;
      moveX = 0;
      analogStick.style.transform = "translate(-50%, -50%)";
    }
    
    analogArea.addEventListener("touchstart", onStart);
    analogArea.addEventListener("touchmove", onMove);
    analogArea.addEventListener("touchend", onEnd);
    analogArea.addEventListener("mousedown", onStart);
    window.addEventListener("mousemove", (e) => { if (stickActive) onMove(e); });
    window.addEventListener("mouseup", onEnd);
    
    // ========== TOMBOL ==========
    const btnAttack = document.getElementById("btnAttack");
    const btnJump = document.getElementById("btnJump");
    
    btnJump.addEventListener("click", () => {
      if (player.onGround && !player.isAttacking) {
        player.vy = -player.jumpPower;
        player.onGround = false;
      }
    });
    btnJump.addEventListener("touchstart", (e) => { e.preventDefault(); btnJump.click(); });
    
    btnAttack.addEventListener("click", () => {
      if (player.isAttacking) return;
      if (player.mp < 5) return;
      player.isAttacking = true;
      player.attackTimer = 0.3;
      player.mp -= 5;
      updateUI();
    });
    btnAttack.addEventListener("touchstart", (e) => { e.preventDefault(); btnAttack.click(); });
    
    // ========== UI ==========
    const hpFill = document.getElementById("hpFill");
    const mpFill = document.getElementById("mpFill");
    const hpbarDiv = document.getElementById("hpbar");
    
    function updateUI() {
      hpFill.style.width = `${(player.hp / player.maxHp) * 100}%`;
      mpFill.style.width = `${(player.mp / player.maxMp) * 100}%`;
    }
    
    // ========== SELECT KARAKTER ==========
    const cardMiya = document.getElementById("cardMiya");
    const cardShuken = document.getElementById("cardShuken");
    const btnStart = document.getElementById("btnStart");
    const selectScreen = document.getElementById("selectScreen");
    
    cardMiya.onclick = () => {
      cardMiya.classList.add("selected");
      cardShuken.classList.remove("selected");
      selectedHero = "miya";
      btnStart.classList.remove("disabled");
    };
    cardShuken.onclick = () => {
      cardShuken.classList.add("selected");
      cardMiya.classList.remove("selected");
      selectedHero = "shuken";
      btnStart.classList.remove("disabled");
    };
    
    btnStart.onclick = () => {
      if (!selectedHero) return;
      selectScreen.style.display = "none";
      hpbarDiv.style.display = "block";
      
      if (selectedHero === "miya") {
        player.hp = 150;
        player.maxHp = 150;
        player.speed = 400;
        player.width = 100;
        player.height = 100;
        player.img = miyaImg;
      } else {
        player.hp = 120;
        player.maxHp = 120;
        player.speed = 550;
        player.width = 110;
        player.height = 110;
        player.img = shukenImg;
      }
      player.mp = 100;
      player.maxMp = 100;
      player.x = canvas.width/2 - player.width/2;
      player.y = groundY - player.height;
      updateUI();
      startGame();
    };
    
    // ========== GAME LOOP ==========
    function startGame() {
      function gameLoop(now) {
        let dt = Math.min(0.033, (now - lastTime) / 1000);
        lastTime = now;
        
        // Update player physics
        if (!player.isAttacking) {
          player.vx = moveX;
        } else {
          player.vx = 0;
        }
        
        player.x += player.vx * dt;
        player.vy += player.gravity * dt;
        player.y += player.vy * dt;
        
        // Ground collision
        if (player.y + player.height >= groundY) {
          player.y = groundY - player.height;
          player.vy = 0;
          player.onGround = true;
        } else {
          player.onGround = false;
        }
        
        // Batas kiri-kanan
        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
        
        // Attack timer
        if (player.attackTimer > 0) {
          player.attackTimer -= dt;
          if (player.attackTimer <= 0) {
            player.isAttacking = false;
          }
        }
        
        // Regen MP
        player.mp = Math.min(player.maxMp, player.mp + 10 * dt);
        updateUI();
        
        // DRAW
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Ground
        ctx.fillStyle = "#4a6a3a";
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY + 10);
        ctx.fillStyle = "#8B5A2B";
        ctx.fillRect(0, groundY - 10, canvas.width, 10);
        
        // Player
        if (player.img && player.img.complete) {
          ctx.drawImage(player.img, player.x, player.y, player.width, player.height);
        } else {
          // Fallback kotak
          ctx.fillStyle = selectedHero === "miya" ? "#00ff88" : "#aa44ff";
          ctx.fillRect(player.x, player.y, player.width, player.height);
          ctx.fillStyle = "white";
          ctx.font = "20px monospace";
          ctx.fillText(selectedHero === "miya" ? "MIYA" : "SHUKEN", player.x + 10, player.y + 50);
        }
        
        // Attack effect
        if (player.isAttacking) {
          ctx.fillStyle = "yellow";
          ctx.fillRect(player.x + player.width, player.y + 20, 30, 60);
        }
        
        // Debug text
        ctx.fillStyle = "white";
        ctx.font = "14px monospace";
        ctx.fillText(`X: ${Math.floor(player.x)} | Ground: ${player.onGround}`, 10, 50);
        
        requestAnimationFrame(gameLoop);
      }
      
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }
    
    // START
    loadImages();
  </script>
</body>
</html>
